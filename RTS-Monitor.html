<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS — Channel Health Monitor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Base ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg:        #1a1a1a;
        --bg2:       #222222;
        --bg3:       #2e2e2e;
        --border:    #444444;
        --cyan:      #a18bf5;
        --cyan-dim:  #3f1568;
        --green:     #3fb950;
        --green-dim: rgba(63,185,80,0.12);
        --red:       #ff4e6a;
        --red-dim:   rgba(255,78,106,0.12);
        --orange:    #faa51a;
        --orange-dim:rgba(250,165,26,0.12);
        --text:      #f2f2f2;
        --text-dim:  #9b9b9b;
        --accent:    #a18bf5;
        --accent2:   #faa51a;
        --font-mono: "Space Mono", monospace;
        --font-sans: "Syne", sans-serif;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13px;
        line-height: 1.5;
        overflow: hidden;
      }

      /* ── Login Screen ───────────────────────────────────────────── */
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(
            ellipse 80% 60% at 50% 0%,
            rgba(161,139,245,0.07) 0%,
            transparent 70%
          ),
          var(--bg);
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2.5rem;
        box-shadow: 0 0 60px rgba(161,139,245,0.08);
      }

      .login-title {
        font-family: var(--font-mono);
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.2rem;
      }
      .field label {
        display: block;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      .field input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 0.6rem 0.8rem;
        color: #fff;
        font-family: var(--font-mono);
        outline: none;
      }

      .btn {
        width: 100%;
        background: var(--cyan);
        color: #000;
        border: none;
        border-radius: 3px;
        padding: 0.7rem;
        font-family: var(--font-mono);
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
      }

      /* ── Dashboard ──────────────────────────────────────────────── */
      #dashboard {
        display: none;
        flex-direction: column;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        height: 50px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
      }

      .topbar-brand {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text);
      }

      .stat-pill {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
      }
      .stat-pill span {
        color: var(--cyan);
        font-weight: 600;
      }

      #pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }
      #pulse.idle {
        background: var(--text-dim);
        box-shadow: none;
      }

      /* Toolbar (Filters & Pagination) */
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 1.5rem;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .search-input {
        background: var(--bg3);
        border: 1px solid var(--border);
        color: #fff;
        padding: 5px 10px;
        font-family: var(--font-mono);
        font-size: 12px;
        width: 250px;
        border-radius: 3px;
      }

      .btn-sm {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 3px 10px;
        font-family: var(--font-mono);
        font-size: 10px;
        cursor: pointer;
        border-radius: 2px;
      }
      .btn-sm:hover:not(:disabled) {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .btn-sm:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* Table Area */
      .table-wrap {
        flex: 1;
        overflow-y: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--bg2);
        color: var(--cyan);
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 10px 1.5rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
      }
      tbody tr:hover {
        background: var(--bg2);
      }
      tbody td {
        padding: 10px 1.5rem;
        font-family: var(--font-mono);
        font-size: 13px;
      }

      /* Status Icons */
      .pub-icons-container {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      .pub-icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .pub-icon.active {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      .pub-icon.warning {
        background: var(--orange);
        box-shadow: 0 0 10px var(--orange);
        animation: blink 1s infinite;
      }
      .pub-icon.inactive {
        background: var(--red-dim);
        border: 1px solid var(--red);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .badge {
        padding: 2px 8px;
        border-radius: 2px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .badge.active {
        background: var(--green-dim);
        color: var(--green);
      }
      .badge.warning {
        background: var(--orange-dim);
        color: var(--orange);
      }
      .badge.inactive {
        background: var(--red-dim);
        color: var(--red);
      }

      .btn-sm.update:hover { border-color: var(--cyan); color: var(--cyan); }

      /* ── Git Pull Modal ─────────────────────────────────────────── */
      #git-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: #000a;
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #git-modal.open { display: flex; }
      .git-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1.5rem 2rem;
        width: 480px;
        max-width: 90vw;
      }
      .git-card-title {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 700;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .git-output {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 0.8rem 1rem;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text);
        white-space: pre-wrap;
        min-height: 60px;
        margin-bottom: 1rem;
      }
      .git-output.ok  { color: var(--green); }
      .git-output.err { color: var(--red); }
        padding: 50px;
        text-align: center;
        color: var(--text-dim);
        font-family: var(--font-mono);
      }

      /* ── Tabs ────────────────────────────────────────────────────── */
      .tab-bar {
        display: flex;
        gap: 0;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
      }
      .tab-btn {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 10px 20px;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      .tab-btn:hover { color: var(--cyan); }
      .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

      /* ── Tab Panels ─────────────────────────────────────────────── */
      .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
      .tab-panel.active { display: flex; }

      /* ── Viewing Report ─────────────────────────────────────────── */
      .vr-layout {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .vr-form {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        padding: 12px 1.5rem;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .vr-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .vr-field label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--cyan);
        text-transform: uppercase;
      }
      .vr-field input {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: #fff;
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 5px 8px;
        outline: none;
        width: 200px;
      }
      .vr-field input:focus { border-color: var(--cyan); }
      .vr-field input[type="number"] { width: 110px; }
      .btn-run {
        background: var(--cyan);
        color: #000;
        border: none;
        border-radius: 3px;
        padding: 6px 18px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-csv {
        background: transparent;
        border: 1px solid var(--cyan);
        color: var(--cyan);
        border-radius: 3px;
        padding: 6px 14px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        white-space: nowrap;
        display: none;
      }
      .btn-csv:hover { background: var(--cyan); color: #000; }
      .btn-load-more {
        display: block;
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        border-top: none;
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 10px;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      .btn-load-more:hover { color: var(--cyan); border-color: var(--cyan); }
      .vr-status {
        padding: 6px 1.5rem;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        min-height: 28px;
      }
      .vr-status.ok  { color: var(--green); }
      .vr-status.err { color: var(--red); }
      .vr-table-wrap {
        flex: 1;
        overflow: auto;
      }
      .vr-table-wrap table {
        width: max-content;
        min-width: 100%;
      }

      /* ── Noise overlay ─────────────────────────────────────────── */
      .noise-overlay {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
        opacity: 0.35;
      }

      /* ── Logo mark hex ─────────────────────────────────────────── */
      .logo-mark {
        width: 22px;
        height: 22px;
        background: var(--accent);
        clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
        flex-shrink: 0;
        animation: pulse-hex 3s ease-in-out infinite;
      }
      @keyframes pulse-hex {
        0%,100% { filter: drop-shadow(0 0 4px var(--accent)); }
        50%      { filter: drop-shadow(0 0 12px var(--accent)); }
      }

      /* ── Server resource pills ─────────────────────────────────── */
      .res-item {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg3);
        font-family: var(--font-mono);
        font-size: 0.6rem;
        color: var(--text-dim);
        transition: all 0.4s;
        white-space: nowrap;
      }
      .res-item.ok   { border-color: rgba(63,185,80,0.35);  background: var(--green-dim);  color: var(--green);  }
      .res-item.warn { border-color: rgba(250,165,26,0.35); background: var(--orange-dim); color: var(--orange); }
      .res-item.err  { border-color: rgba(255,78,106,0.35); background: var(--red-dim);    color: var(--red);    }
      .res-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="noise-overlay"></div>
    <div id="login-screen">
      <div class="login-card">
        <div class="login-title" style="background:linear-gradient(135deg,#f2f2f2,#a18bf5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">RTS MONITOR</div>
        <div class="field">
          <label>App ID</label>
          <input id="inp-appid" type="text" placeholder="your-app-id" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="inp-password" type="password" placeholder="••••••••" />
        </div>
        <div class="field">
          <label>Refresh Interval (seconds)</label>
          <input id="inp-interval" type="number" value="5" min="2" />
        </div>
        <div
          id="login-error"
          style="
            color: var(--red);
            font-size: 12px;
            margin-bottom: 15px;
            min-height: 1em;
          "
        ></div>
        <button class="btn" onclick="connect()">Connect</button>
      </div>
    </div>

    <div id="dashboard">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="logo-mark"></div>
          <div class="topbar-brand">RTS <span style="color:var(--accent)">Monitor</span></div>
          <div class="topbar-brand" style="color:var(--text-dim);font-size:10px;font-weight:400" id="sb-appid"></div>
        </div>
        <div style="display: flex; gap: 20px; align-items: center">
          <div class="stat-pill">Total: <span id="stat-total">—</span></div>
          <div class="stat-pill">
            Healthy: <span id="stat-active" style="color: var(--green)">—</span>
          </div>
          <div class="stat-pill">
            Critical: <span id="stat-offline" style="color: var(--red)">—</span>
          </div>
          <div id="pulse" class="idle"></div>
          <!--<button class="btn-sm" onclick="gitPull()">⟳ UPDATE</button>-->
          <button class="btn-sm" onclick="disconnect()">LOGOUT</button>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('channels')">Channels</button>
        <button class="tab-btn" onclick="switchTab('viewing-report')">Viewing Report</button>
      </div>

      <!-- ── TAB: Channels ──────────────────────────────────────── -->
      <div id="tab-channels" class="tab-panel active">
      <div class="toolbar">
        <div style="display: flex; gap: 20px; align-items: center">
          <input
            type="text"
            id="search-box"
            class="search-input"
            placeholder="Search by name..."
            oninput="handleFilterChange()"
          />
          <label
            style="
              font-family: var(--font-mono);
              font-size: 11px;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 5px;
            "
          >
            <input
              type="checkbox"
              id="filter-active"
              onchange="handleFilterChange()"
            />
            ONLY ACTIVE
          </label>
        </div>
        <div
          id="pagination-controls"
          style="
            font-family: var(--font-mono);
            font-size: 11px;
            display: flex;
            gap: 10px;
            align-items: center;
          "
        >
          <button class="btn-sm" id="btn-prev" onclick="changePage(-1)">
            PREV
          </button>
          <span
            >PAGE <span id="curr-page">1</span> /
            <span id="total-pages">1</span></span
          >
          <button class="btn-sm" id="btn-next" onclick="changePage(1)">
            NEXT
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CHANNEL NAME</th>
              <th>EVENT ID (ALIAS)</th>
              <th>CREATED</th>
              <th style="text-align: center">PUBLISHERS (PRI/BCK)</th>
              <th style="text-align: center">STATUS</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="5" class="table-message">Connecting...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        style="
          padding: 5px 1.5rem;
          background: var(--bg2);
          border-top: 1px solid var(--border);
          font-family: var(--font-mono);
          font-size: 10px;
          color: var(--text-dim);
          display: flex;
          justify-content: space-between;
        "
      >
        <div>Last Sync: <span id="last-update">—</span></div>
        <div id="next-refresh">Next update in —s</div>
      </div>
      </div><!-- /tab-channels -->

      <!-- ── TAB: Viewing Report ───────────────────────────────── -->
      <div id="tab-viewing-report" class="tab-panel">
        <div class="vr-layout">
          <div class="vr-form">
            <div class="vr-field">
              <label>Event ID (Channel Alias)</label>
              <input id="vr-alias" type="text" placeholder="e.g. 2046981" />
            </div>
            <div class="vr-field">
              <label>Start (UTC)</label>
              <input id="vr-start" type="datetime-local" step="1" />
            </div>
            <div class="vr-field">
              <label>End (UTC)</label>
              <input id="vr-end" type="datetime-local" step="1" />
            </div>
            <button id="vr-run-btn" class="btn-run" onclick="runViewingReport()">Run</button>
            <button id="vr-csv-btn" class="btn-csv" onclick="downloadCsv()">↓ CSV</button>
          </div>
          <div id="vr-status" class="vr-status">Enter parameters and press Run.</div>
          <div class="vr-table-wrap">
            <table id="vr-table">
              <thead id="vr-thead"><tr></tr></thead>
              <tbody id="vr-tbody"></tbody>
            </table>
            <button id="vr-load-more" class="btn-load-more" onclick="loadMoreRows()" style="display:none"></button>
          </div>
        </div>
      </div><!-- /tab-viewing-report -->

    </div><!-- /#dashboard -->

    <!-- ── Git Pull Modal ──────────────────────────────────────────── -->
    <div id="git-modal">
      <div class="git-card">
        <div class="git-card-title">⟳ Update from Git</div>
        <div id="git-output" class="git-output">Running git pull...</div>
        <button class="btn-sm" onclick="closeGitModal()">Close</button>
      </div>
    </div>

    <script>
      async function gitPull() {
        const modal = document.getElementById("git-modal");
        const output = document.getElementById("git-output");
        output.textContent = "Running git pull...";
        output.className = "git-output";
        modal.classList.add("open");

        try {
          const res = await fetch(`${PROXY}/git-pull`, {
            method: "POST",
            headers: headers(),
          });
          const data = await res.json();
          output.textContent = data.output || "(no output)";
          output.classList.add(data.success ? "ok" : "err");
        } catch (e) {
          output.textContent = `Error: ${e.message}`;
          output.classList.add("err");
        }
      }

      function closeGitModal() {
        document.getElementById("git-modal").classList.remove("open");
      }

      const PROXY = "/so-proxy";

      let appId, password, interval, timer, countdown;
      let secondsLeft = 0;
      let globalChannels = [];
      let globalState = {};
      let currentPage = 1;
      const itemsPerPage = 50;

      function headers() {
        return { "X-App-Id": appId, "X-Password": password };
      }

      async function connect() {
        appId = document.getElementById("inp-appid").value.trim();
        password = document.getElementById("inp-password").value;
        interval = parseInt(document.getElementById("inp-interval").value) || 5;

        if (!appId || !password) return;

        const errDiv = document.getElementById("login-error");
        errDiv.textContent = "";

        try {
          const res = await fetch(`${PROXY}/channels`, { headers: headers() });
          if (!res.ok) throw new Error("Invalid credentials or Proxy error.");

          document.getElementById("login-screen").style.display = "none";
          document.getElementById("dashboard").style.display = "flex";
          document.getElementById("sb-appid").textContent = appId;

          startMonitor();
        } catch (e) {
          errDiv.textContent = e.message;
        }
      }

      function disconnect() {
        clearInterval(timer);
        clearInterval(countdown);

        // Clear data
        globalChannels = [];
        globalState = {};
        currentPage = 1;

        // Clear UI
        document.getElementById("table-body").innerHTML =
          '<tr><td colspan="3" class="table-message">Connecting...</td></tr>';
        document.getElementById("stat-total").textContent = "—";
        document.getElementById("stat-active").textContent = "—";
        document.getElementById("stat-offline").textContent = "—";
        document.getElementById("search-box").value = "";
        document.getElementById("filter-active").checked = false;

        document.getElementById("dashboard").style.display = "none";
        document.getElementById("login-screen").style.display = "flex";
      }

      function startMonitor() {
        fetchData();
        timer = setInterval(fetchData, interval * 1000);
        countdown = setInterval(() => {
          secondsLeft = Math.max(0, secondsLeft - 1);
          document.getElementById(
            "next-refresh"
          ).textContent = `Next update in ${secondsLeft}s`;
        }, 1000);
      }

      async function fetchData() {
        document.getElementById("pulse").classList.remove("idle");
        secondsLeft = interval;

        try {
          const res = await fetch(`${PROXY}/channels`, { headers: headers() });
          const data = await res.json();
          globalChannels = (
            Array.isArray(data) ? data : data.channels || []
          ).sort((a, b) =>
            a.name.localeCompare(b.name, undefined, { numeric: true })
          );

          // PROCESSAMENTO EM LOTES (CHUNKS)
          const chunkSize = 50; // Processa 50 por vez para não travar o proxy
          for (let i = 0; i < globalChannels.map.length; i += chunkSize) {
            const chunk = globalChannels.slice(i, i + chunkSize);

            await Promise.all(
              chunk.map(async (ch) => {
                try {
                  const r = await fetch(
                    `${PROXY}/publishers/count/${encodeURIComponent(
                      ch.channelId
                    )}`,
                    { headers: headers() }
                  );
                  const txt = await r.text();
                  globalState[ch.channelId] = parseInt(txt) || 0;
                } catch {
                  globalState[ch.channelId] = 0;
                }
              })
            );

            // Atualiza a tabela parcialmente para o usuário ver progresso
            render();
          }

          updateStats();
          document.getElementById("last-update").textContent =
            new Date().toLocaleTimeString();
        } catch (e) {
          console.error("Sync error:", e);
        }

        document.getElementById("pulse").classList.add("idle");
      }

      function handleFilterChange() {
        currentPage = 1;
        render();
      }

      function changePage(step) {
        currentPage += step;
        render();
      }

      function render() {
        const tbody = document.getElementById("table-body");
        const searchTerm = document
          .getElementById("search-box")
          .value.toLowerCase();
        const onlyActive = document.getElementById("filter-active").checked;

        // 1. Filter
        let filtered = globalChannels.filter((ch) => {
          const matchesSearch = ch.name.toLowerCase().includes(searchTerm);
          const count = globalState[ch.channelId] || 0;
          const matchesActive = onlyActive ? count > 0 : true;
          return matchesSearch && matchesActive;
        });

        // 2. Pagination
        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        document.getElementById("curr-page").textContent = currentPage;
        document.getElementById("total-pages").textContent = totalPages;
        document.getElementById("btn-prev").disabled = currentPage === 1;
        document.getElementById("btn-next").disabled =
          currentPage === totalPages;

        const start = (currentPage - 1) * itemsPerPage;
        const paginated = filtered.slice(start, start + itemsPerPage);

        // 3. Render
        tbody.innerHTML = "";
        if (paginated.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="table-message">No channels found matching criteria.</td></tr>';
          return;
        }

        paginated.forEach((ch) => {
          const count = globalState[ch.channelId] || 0;
          let icons, badge;

          if (count >= 2) {
            icons =
              '<div class="pub-icon active"></div><div class="pub-icon active"></div>';
            badge = '<span class="badge active">Healthy</span>';
          } else if (count === 1) {
            icons =
              '<div class="pub-icon warning"></div><div class="pub-icon inactive"></div>';
            badge = '<span class="badge warning">No Backup</span>';
          } else {
            icons =
              '<div class="pub-icon inactive"></div><div class="pub-icon inactive"></div>';
            badge = '<span class="badge inactive">Offline</span>';
          }

          const tr = document.createElement("tr");
          const createdDate = ch.created
            ? new Date(ch.created).toLocaleString("en-GB", {
                dateStyle: "short",
                timeStyle: "short",
              })
            : "—";
          tr.innerHTML = `
      <td style="color:#fff; font-weight:600;">${ch.name}</td>
      <td style="color:var(--text-dim);">${ch.alias || "—"}</td>
      <td style="color:var(--text-dim); white-space:nowrap;">${createdDate}</td>
      <td style="text-align:center"><div class="pub-icons-container">${icons}</div></td>
      <td style="text-align:center">${badge}</td>
    `;
          tbody.appendChild(tr);
        });
      }

      function updateStats() {
        const total = globalChannels.length;
        const active = globalChannels.filter(
          (c) => globalState[c.channelId] > 0
        ).length;
        const offline = total - active;

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-active").textContent = active;
        document.getElementById("stat-offline").textContent = offline;
      }

      // ── Tab switching ───────────────────────────────────────────
      function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
          b.classList.toggle('active', b.getAttribute('onclick').includes("'" + name + "'"));
        });
        document.querySelectorAll('.tab-panel').forEach(p => {
          p.classList.toggle('active', p.id === 'tab-' + name);
        });
      }

      // ── Viewing Report ─────────────────────────────────────────
      let _vrRawCsv = null;

      function _toIso(dtLocal) {
        // datetime-local gives "YYYY-MM-DDTHH:MM:SS" — treat as UTC
        return dtLocal ? dtLocal.replace('T', 'T') + 'Z' : '';
      }

      function _parseCsv(text) {
        const lines = text.trim().split('\n');
        if (lines.length < 1) return { headers: [], rows: [] };
        const parse = line => {
          const result = [];
          let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { inQ = !inQ; }
            else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
            else { cur += c; }
          }
          result.push(cur);
          return result;
        };
        const headers = parse(lines[0]);
        const rows = lines.slice(1).filter(l => l.trim()).map(parse);
        return { headers, rows };
      }

      // Columns to show in the table (subset of the full CSV)
      const VR_COLS = [
        'ChannelAlias','StartTimestamp','EndTimestamp',
        'ViewedMinutesDuringPeriod','ViewedMinutesTotal',
        'TotalBytes','Region','Country','City',
        'RemoteAddress','UserAgent','Tags'
      ];
      const VR_PAGE = 100;
      let _vrParsed = null;   // { headers, rows, colIdxs, displayHeaders }
      let _vrLoaded = 0;      // rows rendered so far

      function _formatCell(value, colName) {
        let v = (value || '').trim();
        if (v.match(/^\d{4}-\d{2}-\d{2}T/)) {
          try {
            const d = new Date(v);
            v = d.getUTCFullYear() + '-'
              + String(d.getUTCMonth()+1).padStart(2,'0') + '-'
              + String(d.getUTCDate()).padStart(2,'0') + ' '
              + String(d.getUTCHours()).padStart(2,'0') + ':'
              + String(d.getUTCMinutes()).padStart(2,'0') + ':'
              + String(d.getUTCSeconds()).padStart(2,'0') + ' UTC';
          } catch {}
        }
        if (colName === 'TotalBytes' && v) {
          const n = parseInt(v);
          if (!isNaN(n)) v = (n / 1e6).toFixed(2) + ' MB';
        }
        return v || '—';
      }

      function _rowsToHtml(rows, colIdxs, displayHeaders) {
        return rows.map(row => {
          const cells = colIdxs.map((ci, hi) =>
            `<td>${_formatCell(row[ci], displayHeaders[hi])}</td>`
          );
          return '<tr>' + cells.join('') + '</tr>';
        }).join('');
      }

      function _initTable(csv) {
        const { headers, rows } = _parseCsv(csv);
        const colIdxs = VR_COLS.map(c => headers.indexOf(c)).filter(i => i >= 0);
        const displayHeaders = colIdxs.map(i => headers[i]);
        _vrParsed = { headers, rows, colIdxs, displayHeaders };
        _vrLoaded = 0;

        const thead = document.getElementById('vr-thead');
        thead.innerHTML = '<tr>' + displayHeaders.map(h => `<th>${h}</th>`).join('') + '</tr>';

        const tbody = document.getElementById('vr-tbody');
        if (rows.length === 0) {
          tbody.innerHTML = `<tr><td colspan="${displayHeaders.length}" class="table-message">No sessions in this period.</td></tr>`;
          document.getElementById('vr-load-more').style.display = 'none';
          return 0;
        }

        const slice = rows.slice(0, VR_PAGE);
        tbody.innerHTML = _rowsToHtml(slice, colIdxs, displayHeaders);
        _vrLoaded = slice.length;
        _updateLoadMore();
        return rows.length;
      }

      function loadMoreRows() {
        if (!_vrParsed) return;
        const { rows, colIdxs, displayHeaders } = _vrParsed;
        const slice = rows.slice(_vrLoaded, _vrLoaded + VR_PAGE);
        document.getElementById('vr-tbody').insertAdjacentHTML(
          'beforeend',
          _rowsToHtml(slice, colIdxs, displayHeaders)
        );
        _vrLoaded += slice.length;
        _updateLoadMore();
      }

      function _updateLoadMore() {
        const btn = document.getElementById('vr-load-more');
        const remaining = _vrParsed.rows.length - _vrLoaded;
        if (remaining > 0) {
          btn.style.display = 'block';
          btn.textContent = `Load more  (${_vrLoaded} / ${_vrParsed.rows.length} — ${remaining} remaining)`;
        } else {
          btn.style.display = 'none';
        }
      }

      async function runViewingReport() {
        const alias = document.getElementById('vr-alias').value.trim();
        const start = document.getElementById('vr-start').value;
        const end   = document.getElementById('vr-end').value;
        const statusEl = document.getElementById('vr-status');
        const btn = document.getElementById('vr-run-btn');

        if (!alias || !start || !end) {
          statusEl.className = 'vr-status err';
          statusEl.textContent = 'Please fill in all fields.';
          return;
        }

        btn.disabled = true;
        document.getElementById('vr-csv-btn').style.display = 'none';
        document.getElementById('vr-load-more').style.display = 'none';
        statusEl.className = 'vr-status';
        statusEl.textContent = 'Fetching report…';
        document.getElementById('vr-thead').innerHTML = '<tr></tr>';
        document.getElementById('vr-tbody').innerHTML = '';
        _vrRawCsv = null;
        _vrParsed = null;

        try {
          const res = await fetch(`${PROXY}/rts/viewing-report`, {
            method: 'POST',
            headers: { ...headers(), 'Content-Type': 'application/json' },
            body: JSON.stringify({
              channel_alias: alias,
              start: _toIso(start),
              end:   _toIso(end),
            })
          });

          const text = await res.text();

          if (!res.ok) {
            statusEl.className = 'vr-status err';
            statusEl.textContent = `Error ${res.status}: ${text.slice(0, 200)}`;
            btn.disabled = false;
            return;
          }

          _vrRawCsv = text;
          const count = _initTable(text);
          const shown = Math.min(count, VR_PAGE);
          statusEl.className = 'vr-status ok';
          statusEl.textContent = `${count} session${count !== 1 ? 's' : ''} found  ·  Showing ${shown}  ·  Period: ${start} → ${end} UTC`;
          if (count > 0) document.getElementById('vr-csv-btn').style.display = 'inline-block';

        } catch (e) {
          statusEl.className = 'vr-status err';
          statusEl.textContent = `Request failed: ${e.message}`;
        }

        btn.disabled = false;
      }

      function downloadCsv() {
        if (!_vrRawCsv) return;
        const alias = document.getElementById('vr-alias').value.trim();
        const blob = new Blob([_vrRawCsv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `viewing-report-${alias}-${Date.now()}.csv`;
        a.click();
      }

    </script>
  </body>
</html>
