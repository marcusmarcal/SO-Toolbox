<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC 2026 · Engineering Rota</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0c10;
        --surface: #111419;
        --surface2: #181c23;
        --border: #252932;
        --gold: #f5c842;
        --red: #e84545;
        --green: #3dd68c;
        --blue: #4a9eff;
        --orange: #ff9933;
        --muted: #5a6070;
        --text: #d8dde8;
        --text2: #9aa0b0;
        --cn: #4a9eff;
        --cg: #f5c842;
        --ch: #3dd68c;
        --cn-bg: #4a9eff14;
        --cg-bg: #f5c84214;
        --ch-bg: #3dd68c14;
        --cn-bd: #1e4070;
        --cg-bd: #604800;
        --ch-bd: #0e4830;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 13px;
        line-height: 1.5;
        min-height: 100vh;
      }

      /* HEADER */
      header {
        background: var(--surface);
        border-bottom: 2px solid var(--gold);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        color: var(--gold);
        letter-spacing: 2px;
        line-height: 1;
      }
      .logo span {
        color: var(--text2);
        font-size: 0.75rem;
        display: block;
        letter-spacing: 4px;
        font-family: "IBM Plex Mono", monospace;
        margin-top: 1px;
      }
      .hstats {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-left: auto;
      }
      .stat {
        text-align: center;
      }
      .sv {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        color: var(--gold);
        line-height: 1;
      }
      .sl {
        font-size: 9px;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "IBM Plex Mono", monospace;
      }
      .xbtn {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        white-space: nowrap;
        align-self: center;
      }
      .xbtn:hover {
        background: var(--gold);
        color: #000;
      }

      /* CONTROLS */
      .controls {
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        padding: 9px 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .controls label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: "IBM Plex Mono", monospace;
      }
      .fg {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .fb {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 3px 10px;
        border-radius: 3px;
        cursor: pointer;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        transition: all 0.12s;
      }
      .fb:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .fb.active {
        background: var(--gold);
        border-color: var(--gold);
        color: #000;
        font-weight: 700;
      }
      .sb {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 10px;
        border-radius: 3px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        width: 160px;
        outline: none;
      }
      .sb:focus {
        border-color: var(--gold);
      }
      .sb::placeholder {
        color: var(--muted);
      }
      .vl {
        width: 1px;
        height: 22px;
        background: var(--border);
      }
      .engin {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: auto;
      }
      .einp {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        padding: 1px 4px;
        width: 80px;
        outline: none;
      }
      .einp:focus {
        border-color: var(--gold);
      }
      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-right: 2px;
      }
      .dn {
        background: var(--cn);
      }
      .dg {
        background: var(--cg);
      }
      .dhu {
        background: var(--ch);
      }

      /* LEGEND */
      .legend {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 8px 24px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 11px;
        font-family: "IBM Plex Mono", monospace;
        align-items: center;
      }
      .li {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .badge {
        padding: 2px 7px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.4px;
        display: inline-block;
      }
      .bN {
        background: var(--cn-bd);
        color: var(--cn);
        border: 1px solid #2a5a90;
      }
      .bG {
        background: var(--cg-bd);
        color: var(--cg);
        border: 1px solid #906000;
      }
      .bH {
        background: var(--ch-bd);
        color: var(--ch);
        border: 1px solid #107840;
      }
      .dual-tag {
        background: #3a0808;
        color: var(--red);
        border: 1px solid #802020;
        border-radius: 3px;
        font-size: 10px;
        padding: 1px 5px;
        font-weight: 700;
      }
      .late-tag {
        background: #2a1800;
        color: var(--orange);
        border: 1px solid #7a4000;
        border-radius: 3px;
        font-size: 9px;
        padding: 1px 4px;
        vertical-align: middle;
        margin-left: 2px;
      }

      /* SUMMARY */
      .sum-wrap {
        padding: 14px 24px 0;
      }
      .sum-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }
      .scard {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 14px;
      }
      .scname {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .hrow {
        display: flex;
        justify-content: space-between;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        color: var(--text2);
        margin-bottom: 3px;
      }
      .hrow b {
        color: var(--text);
      }
      .hbar {
        height: 5px;
        background: var(--border);
        border-radius: 2px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .hfill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s;
      }
      .fn {
        background: var(--cn);
      }
      .fg2 {
        background: var(--cg);
      }
      .fh {
        background: var(--ch);
      }

      /* MAIN */
      main {
        padding: 4px 24px 28px;
      }

      /* DAY BLOCK */
      .day-block {
        margin-bottom: 18px;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .day-block.hidden {
        display: none;
      }
      .dh {
        background: var(--surface2);
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .ddate {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.1rem;
        color: var(--gold);
        letter-spacing: 1px;
        min-width: 110px;
      }
      .drange {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        background: var(--surface);
        padding: 2px 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
        white-space: nowrap;
      }
      .dhours {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        color: var(--text2);
        white-space: nowrap;
      }
      .dcnt {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        margin-left: auto;
        white-space: nowrap;
      }

      /* TABLE */
      .mt {
        width: 100%;
        border-collapse: collapse;
      }
      .mt th {
        text-align: left;
        font-family: "IBM Plex Mono", monospace;
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 5px 10px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        white-space: nowrap;
      }
      .mr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }
      .mr:last-child {
        border-bottom: none;
      }
      .mr:hover {
        background: #13161d;
      }
      .mr td {
        padding: 7px 10px;
        vertical-align: middle;
      }
      .mr.rN {
        background: #0c1420;
      }
      .mr.rG {
        background: #141208;
      }
      .mr.rH {
        background: #0b1410;
      }

      /* KO time */
      .kt {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }
      .kt.eve {
        color: var(--text);
      }
      .kt.late {
        color: var(--orange);
      }
      .kt.deep {
        color: var(--red);
      }
      .kt.day {
        color: var(--text2);
      }

      /* Local time */
      .ltime {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
      }

      .matchup {
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
      }
      .vs {
        color: var(--muted);
        margin: 0 4px;
        font-size: 10px;
      }
      .venue-t {
        font-size: 11px;
        color: var(--text2);
        white-space: nowrap;
      }
      .city-t {
        font-size: 10px;
        color: var(--muted);
        font-family: "IBM Plex Mono", monospace;
      }

      .sbadge {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 2px;
        font-size: 9px;
        font-family: "IBM Plex Mono", monospace;
        font-weight: 700;
        white-space: nowrap;
      }
      .sGroup {
        background: #1a2030;
        color: #7090c0;
        border: 1px solid #2a3a58;
      }
      .sR32 {
        background: #201a10;
        color: #c08020;
        border: 1px solid #503a10;
      }
      .sR16 {
        background: #162016;
        color: #50a040;
        border: 1px solid #284020;
      }
      .sQF {
        background: #201520;
        color: #b060c0;
        border: 1px solid #401850;
      }
      .sSF {
        background: #201010;
        color: #e06060;
        border: 1px solid #501818;
      }
      .s3rd {
        background: #181818;
        color: #909060;
        border: 1px solid #303018;
      }
      .sFinal {
        background: #1e1608;
        color: var(--gold);
        border: 1px solid #604800;
      }

      .gbadge {
        display: inline-block;
        width: 18px;
        height: 18px;
        line-height: 18px;
        text-align: center;
        border-radius: 3px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 0.75rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text2);
        margin-right: 2px;
      }

      /* Per-match assign select */
      .asel {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 3px 6px;
        border-radius: 3px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        cursor: pointer;
        outline: none;
        min-width: 110px;
      }
      .asel:focus {
        border-color: var(--gold);
      }
      .asel.aN {
        background: var(--cn-bg);
        border-color: var(--cn-bd);
        color: var(--cn);
      }
      .asel.aG {
        background: var(--cg-bg);
        border-color: var(--cg-bd);
        color: var(--cg);
      }
      .asel.aH {
        background: var(--ch-bg);
        border-color: var(--ch-bd);
        color: var(--ch);
      }

      /* ── EPG ── */
      /* EPG in day header: spans 14h window 18:00→08:00+1 */
      .epg-hdr {
        flex: 1;
        min-width: 180px;
        max-width: 500px;
        position: relative;
        height: 20px;
        background: #080c12;
        border: 1px solid #1a1e2a;
        border-radius: 3px;
        overflow: visible;
        cursor: default;
      }
      .epg-match-block {
        position: absolute;
        top: 2px;
        height: 16px;
        border-radius: 2px;
        pointer-events: none;
      }
      .epg-shift-bg {
        position: absolute;
        top: 0;
        height: 100%;
        border-radius: 2px;
        pointer-events: none;
        opacity: 0.18;
      }
      .epg-tick {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: #ffffff15;
        pointer-events: none;
      }
      .epg-tlabel {
        position: absolute;
        bottom: -14px;
        font-size: 8px;
        font-family: "IBM Plex Mono", monospace;
        color: #ffffff40;
        transform: translateX(-50%);
        pointer-events: none;
        white-space: nowrap;
      }
      .epg-hdr-wrap {
        padding-bottom: 16px;
        flex: 1;
        min-width: 180px;
        max-width: 500px;
      }

      /* EPG in match row (mini) */
      .epg-mini {
        position: relative;
        height: 14px;
        background: #080c12;
        border: 1px solid #151920;
        border-radius: 2px;
        overflow: hidden;
        min-width: 120px;
      }
      .epg-mb {
        position: absolute;
        top: 1px;
        height: 12px;
        border-radius: 2px;
        opacity: 0.9;
      }
      .epg-mb.bN {
        background: var(--cn);
      }
      .epg-mb.bG {
        background: var(--cg);
      }
      .epg-mb.bH {
        background: var(--ch);
      }
      .epg-mb.bNone {
        background: #4a5060;
      }

      .dual-flag {
        background: #3a0808;
        color: var(--red);
        border: 1px solid #802020;
        border-radius: 3px;
        font-size: 10px;
        padding: 1px 6px;
        font-weight: 700;
        white-space: nowrap;
      }

      .shift-cell {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }

      @media (max-width: 900px) {
        .hsm {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="logo">WC 2026<span>ENGINEERING ROTA</span></div>
      </div>
      <div class="hstats">
        <div class="stat">
          <div class="sv" id="s-total">104</div>
          <div class="sl">Matches</div>
        </div>
        <div class="stat">
          <div class="sv" id="s-days">—</div>
          <div class="sl">Days</div>
        </div>
        <div class="stat">
          <div class="sv" id="s-asgn">0</div>
          <div class="sl">Assigned</div>
        </div>
        <div class="stat">
          <div class="sv" id="s-dual">0</div>
          <div class="sl">Dual⚠</div>
        </div>
      </div>
      <button class="xbtn" onclick="exportCSV()">⬇ Export CSV</button>
      <button
        class="xbtn"
        id="btn-import"
        onclick="document.getElementById('csvFileIn').click()"
      >
        ⬆ Import CSV
      </button>
      <input
        type="file"
        id="csvFileIn"
        accept=".csv"
        style="display: none"
        onchange="importCSV(this)"
      />
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 2px;
          margin-left: 4px;
        "
      >
        <span
          id="user-pill"
          style="
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text2);
            letter-spacing: 0.5px;
          "
          >…</span
        >
        <span
          id="save-status"
          style="
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.5px;
          "
        ></span>
      </div>
    </header>

    <div class="controls">
      <div class="fg">
        <label>Stage:</label>
        <button class="fb active" data-f="stage" data-v="all">All</button>
        <button class="fb" data-f="stage" data-v="Group">Group</button>
        <button class="fb" data-f="stage" data-v="R32">R32</button>
        <button class="fb" data-f="stage" data-v="R16">R16</button>
        <button class="fb" data-f="stage" data-v="QF">QF</button>
        <button class="fb" data-f="stage" data-v="SF">SF</button>
        <button class="fb" data-f="stage" data-v="Final">Final</button>
      </div>
      <div class="vl"></div>
      <div class="fg">
        <label>Eng:</label>
        <button class="fb active" data-f="eng" data-v="all">All</button>
        <button class="fb" data-f="eng" data-v="N" id="fb-N">Nuno</button>
        <button class="fb" data-f="eng" data-v="G" id="fb-G">Goncalo</button>
        <button class="fb" data-f="eng" data-v="H" id="fb-H">Hugo</button>
        <button class="fb" data-f="eng" data-v="dual">⚠ Dual</button>
        <button class="fb" data-f="eng" data-v="none">Unassigned</button>
      </div>
      <div class="vl"></div>
      <input
        class="sb"
        type="text"
        placeholder="Search team / city…"
        id="searchBox"
        oninput="applyFilters()"
      />
      <div class="vl"></div>
      <div class="engin">
        <span class="dot dn"></span
        ><input class="einp" id="e0" value="Nuno" oninput="onRename()" />
        <span class="dot dg"></span
        ><input class="einp" id="e1" value="Goncalo" oninput="onRename()" />
        <span class="dot dhu"></span
        ><input class="einp" id="e2" value="Hugo" oninput="onRename()" />
      </div>
    </div>

    <div class="legend">
      <div class="li"><span class="badge bN" id="l0">Nuno</span></div>
      <div class="li"><span class="badge bG" id="l1">Goncalo</span></div>
      <div class="li"><span class="badge bH" id="l2">Hugo</span></div>
      <div class="li">
        <span class="dual-tag">⚠ DUAL</span> = day spans &gt;10h effective,
        needs 2 engineers
      </div>
      <div class="li">
        <span class="late-tag">LATE</span> = KO after midnight BST
      </div>
      <div style="margin-left: auto; display: flex; gap: 6px">
        <button class="fb" id="btn-auto" onclick="autoAssign()">
          ⚡ Auto-assign
        </button>
        <button class="fb" id="btn-clear" onclick="clearAll()">✕ Clear</button>
      </div>
    </div>

    <div class="sum-wrap"><div class="sum-grid" id="sumGrid"></div></div>
    <main id="mc"></main>

    <script>
      // ─── ALL 104 MATCHES (BST computed from openfootball JSON) ───────────────────
      // Formula: BST = local_time - utc_offset + 1h  (BST=UTC+1)
      // Egypt vs Iran: 20:00 UTC-7 → UTC 03:00 → BST 04:00 ✓
      // NZ vs Belgium: 20:00 UTC-7 → UTC 03:00 → BST 04:00 ✓

      const M = [
        // ── GROUP A ──────────────────────────────────────────────────────────────
        {
          id: 1,
          date: "2026-06-11",
          local: "13:00",
          tz: -6,
          bst: "20:00",
          on: false,
          t1: "Mexico",
          t2: "South Africa",
          g: "A",
          venue: "Estadio Azteca",
          city: "Mexico City",
          stage: "Group",
        },
        {
          id: 2,
          date: "2026-06-11",
          local: "20:00",
          tz: -6,
          bst: "03:00",
          on: true,
          t1: "South Korea",
          t2: "Czechia",
          g: "A",
          venue: "Estadio Akron",
          city: "Guadalajara",
          stage: "Group",
        },
        {
          id: 3,
          date: "2026-06-18",
          local: "12:00",
          tz: -4,
          bst: "17:00",
          on: false,
          t1: "Czechia",
          t2: "South Africa",
          g: "A",
          venue: "Mercedes-Benz Stadium",
          city: "Atlanta",
          stage: "Group",
        },
        {
          id: 4,
          date: "2026-06-18",
          local: "19:00",
          tz: -6,
          bst: "02:00",
          on: true,
          t1: "Mexico",
          t2: "South Korea",
          g: "A",
          venue: "Estadio Akron",
          city: "Guadalajara",
          stage: "Group",
        },

      // ─── SERVER PERSISTENCE ───────────────────────────────────────────────────────
      async function loadFromServer() {
        updateSaveStatus("loading");
        try {
          const r = await fetch("/so-proxy/wc2026/assignments", {
            credentials: "include",
          });
          if (!r.ok) {
            updateSaveStatus("error");
            return;
          }
          const json = await r.json();
          if (!json.ok) {
            updateSaveStatus("error");
            return;
          }
          const data = json.data || {};
          // Restore assignments
          const sa = data.assignments || {};
          Object.keys(sa).forEach((k) => {
            if (sa[k]) A[parseInt(k)] = sa[k];
          });
          // Restore engineer names
          const sn = data.engNames || {};
          if (sn.N) document.getElementById("e0").value = sn.N;
          if (sn.G) document.getElementById("e1").value = sn.G;
          if (sn.H) document.getElementById("e2").value = sn.H;
          // Show last save info
          if (data.updatedBy && data.updatedAt) {
            const dt = new Date(data.updatedAt).toLocaleString("en-GB", {
              dateStyle: "short",
              timeStyle: "short",
            });
            updateSaveStatus("saved", `${data.updatedBy} · ${dt}`);
          } else {
            updateSaveStatus("idle");
          }
        } catch (e) {
          updateSaveStatus("error");
        }
      }

      function schedSave() {
        if (!isAdmin()) return;
        updateSaveStatus("pending");
        clearTimeout(SAVE_DEBOUNCE);
        SAVE_DEBOUNCE = setTimeout(() => saveToServer(), 1200);
      }

      async function saveToServer() {
        if (!isAdmin()) return;
        updateSaveStatus("saving");
        const engNames = {
          N: document.getElementById("e0").value || "Nuno",
          G: document.getElementById("e1").value || "Goncalo",
          H: document.getElementById("e2").value || "Hugo",
        };
        try {
          const r = await fetch("/so-proxy/wc2026/assignments", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ assignments: A, engNames }),
          });
          const json = await r.json();
          if (json.ok) {
            const dt = new Date(json.updatedAt).toLocaleString("en-GB", {
              dateStyle: "short",
              timeStyle: "short",
            });
            updateSaveStatus("saved", `${json.updatedBy} · ${dt}`);
          } else {
            updateSaveStatus("error", json.error || "Erro ao guardar");
          }
        } catch (e) {
          updateSaveStatus("error", "Sem resposta do servidor");
        }
      }

      function updateSaveStatus(state, detail) {
        const el = document.getElementById("save-status");
        if (!el) return;
        const labels = {
          loading: ["⟳ A carregar…", "var(--muted)"],

          saved: ["✓ Guardado", "var(--green)"],
          error: ["✕ Erro", "var(--red)"],
          readonly: ["🔒 Read-only", "var(--muted)"],
        };
        const [lbl, col] = labels[state] || ["", "var(--muted)"];
        el.textContent = detail ? `${lbl}  ${detail}` : lbl;
        el.style.color = col;

      // ─── CSV IMPORT ───────────────────────────────────────────────────────────────
      function importCSV(input) {
        if (!isAdmin()) {
          alert("Só admins podem importar.");
          return;
        }
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const text = e.target.result;
          const lines = text.split(/\r?\n/).filter((l) => l.trim());
          if (lines.length < 2) {
            alert("CSV vazio ou inválido.");
            return;
          }
          const header = parseCSVRow(lines[0]);
          const idxID = header.findIndex(
            (h) => h.trim().toLowerCase() === "id"
          );
          const idxEng = header.findIndex(
            (h) => h.trim().toLowerCase() === "engineer"
          );
          if (idxID < 0 || idxEng < 0) {
            alert('CSV inválido: colunas "ID" e "Engineer" não encontradas.');
            return;
          }
          const nameMap = {};
          let imported = 0,
            skipped = 0;
          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVRow(lines[i]);
            if (cols.length <= Math.max(idxID, idxEng)) continue;
            const id = parseInt(cols[idxID]);
            const engName = (cols[idxEng] || "").trim();
            if (!id || isNaN(id)) continue;
            if (!engName) {
              A[id] = "";
              imported++;
              continue;
            }
            const code = resolveEngCode(engName);
            if (code) {
              A[id] = code;
              nameMap[code] = engName;
              imported++;
            } else {
              skipped++;
            }
          }
          if (nameMap.N) document.getElementById("e0").value = nameMap.N;
          if (nameMap.G) document.getElementById("e1").value = nameMap.G;
          if (nameMap.H) document.getElementById("e2").value = nameMap.H;
          renderAll();
          onRename();
          schedSave();
          const msg =
            `✓ Importadas ${imported} atribuições.` +
            (skipped ? `\n⚠ ${skipped} linhas ignoradas.` : "");
          alert(msg);
          input.value = "";
        };
        reader.readAsText(file);
      }

      function resolveEngCode(name) {
        if (!name) return "";
        const n = name.trim().toLowerCase();
        const slots = [
          ["N", "e0"],
          ["G", "e1"],
          ["H", "e2"],
        ];
        for (const [code, inputId] of slots) {
          const cur = (
            document.getElementById(inputId).value || ""
          ).toLowerCase();
          if (cur && cur === n) return code;
        }
        if (n === "nuno") return "N";
        if (n === "goncalo" || n === "gonçalo") return "G";
        if (n === "hugo") return "H";
        return "";
      }

      function parseCSVRow(line) {
        const result = [];
        let cur = "",
          inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (inQ) {
            if (c === '"' && line[i + 1] === '"') {
              cur += '"';
              i++;
            } else if (c === '"') {
              inQ = false;
            } else cur += c;
          } else {
            if (c === '"') {
              inQ = true;
            } else if (c === ",") {
              result.push(cur);
              cur = "";
            } else cur += c;
          }
        }
        result.push(cur);
        return result;
      }

      function ename(k) {
        return (
          document.getElementById("e" + ["N", "G", "H"].indexOf(k)).value ||
          ["Nuno", "Goncalo", "Hugo"]["NGH".indexOf(k)]
        );
      }

      // ─── TIME UTILS ──────────────────────────────────────────────────────────────
      function bm(t) {
        const [h, m] = t.split(":").map(Number);
        return h * 60 + m;
      }
      // "continuation" minutes: 00-09h treated as next-day (24h+)
      function cm(t) {
        const [h, m] = t.split(":").map(Number);
        return (h < 10 ? h + 24 : h) * 60 + m;
      }

      // ─── SHIFT CALC per day ──────────────────────────────────────────────────────
      // Match duration: Group = 2h45 (165 min), KO stages = 3h30 (210 min, inc ET/PS)
      // Shift = 1h before first KO → projected end of last match (lastKO + matchDur)
      // Dual flag: total span > 10h
      function matchDur(stage) {
        return stage === "Group" ? 165 : 210;
      }
      function calcShift(dayMatches) {
        // Use the latest-stage match's duration for the end calculation
        // (on a mixed day this correctly picks the KO duration when needed)
        const stageOrder = ["Group", "R32", "R16", "QF", "SF", "3rd", "Final"];
        const topStage = dayMatches.reduce((best, m) => {
          return stageOrder.indexOf(m.stage) > stageOrder.indexOf(best)
            ? m.stage
            : best;
        }, "Group");
        const dur = matchDur(topStage);
        const mins = dayMatches.map((m) => cm(m.bst));
        const firstKO = Math.min(...mins);
        const lastKO = Math.max(...mins);
        const start = firstKO - 60; // 1h before first KO
        const end = lastKO + dur; // projected end of last match
        const hours = (end - start) / 60;
        const dual = hours > 10;
        return { start, end, hours: Math.min(hours, 14), dual, dur };
      }

      function fmtMins(m) {
        const h = Math.floor((((m % 1440) + 1440) % 1440) / 60);
        const mm = ((m % 60) + 60) % 60;
        return `${String(h).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
      }

      // ─── EPG ─────────────────────────────────────────────────────────────────────
      // Window: 16:00 → 10:00+1day = 18h = 1080 min
      const EPG_S = 16 * 60; // 16:00
      const EPG_W = 18 * 60; // 18 hours

      function epgX(bst) {
        let m = bm(bst);
        if (m < 10 * 60) m += 1440;
        return Math.max(0, Math.min(100, ((m - EPG_S) / EPG_W) * 100));
      }
      function epgW(dur) {
        return ((dur || 165) / EPG_W) * 100;
      } // match duration in %

      const EPG_TICKS = [16, 18, 20, 22, 0, 2, 4, 6, 8];
      function tickHTML() {
        return EPG_TICKS.map((h) => {
          const m = h < 10 ? h * 60 + 1440 : h * 60;
          const pct = ((m - EPG_S) / EPG_W) * 100;
          if (pct < 0 || pct > 100) return "";
          return `<div class="epg-tick" style="left:${pct.toFixed(
            1
          )}%"></div><div class="epg-tlabel" style="left:${pct.toFixed(
            1
          )}%">${String(h).padStart(2, "0")}</div>`;
        }).join("");
      }
      const TICK_HTML = tickHTML();

      function colClass(eng) {
        return eng === "N"
          ? "bN"
          : eng === "G"
          ? "bG"
          : eng === "H"
          ? "bH"
          : "bNone";
      }
      function engColor(eng) {
        return eng === "N"
          ? "var(--cn)"
          : eng === "G"
          ? "var(--cg)"
          : eng === "H"
          ? "var(--ch)"
          : "#4a5060";
      }

      function buildDayEpg(dayMatches) {
        const { start, end, dur } = calcShift(dayMatches);
        // Collect per-match assignments for colour
        const shiftX = Math.max(0, ((start - EPG_S) / EPG_W) * 100);
        const shiftW = Math.min(100 - shiftX, ((end - start) / EPG_W) * 100);

        // Shift background (grey if mixed/unassigned, coloured if all same)
        const engs = [...new Set(dayMatches.map((m) => A[m.id] || ""))].filter(
          Boolean
        );
        const singleEng = engs.length === 1 ? engs[0] : null;
        const shiftColor = singleEng ? engColor(singleEng) : "#4a5060";

        const shiftBg = `<div class="epg-shift-bg" style="left:${shiftX.toFixed(
          1
        )}%;width:${shiftW.toFixed(1)}%;background:${shiftColor};"></div>`;
        const matchBlks = dayMatches
          .map((m) => {
            const eng = A[m.id] || "";
            const x = epgX(m.bst).toFixed(1);
            const w = Math.max(epgW(matchDur(m.stage)), 0.5).toFixed(1);
            const col = engColor(eng);
            return `<div class="epg-match-block" style="left:${x}%;width:${w}%;background:${col};top:2px;height:16px;" title="${m.t1} vs ${m.t2} · ${m.bst} BST"></div>`;
          })
          .join("");

        return `<div class="epg-hdr-wrap">
    <div class="epg-hdr">${TICK_HTML}${shiftBg}${matchBlks}</div>
  </div>`;
      }

      // Mini EPG for match row
      function buildMiniEpg(m) {
        const eng = A[m.id] || "";
        const dur = matchDur(m.stage);
        const x = epgX(m.bst).toFixed(1);
        const w = Math.max(epgW(dur), 1).toFixed(1);
        return `<div class="epg-mini" title="${m.bst} BST → ~${fmtMins(
          cm(m.bst) + dur
        )} BST">
    <div class="epg-mb ${colClass(eng)}" style="left:${x}%;width:${w}%;"></div>
  </div>`;
      }

      // ─── GROUP BY DATE ────────────────────────────────────────────────────────────
      function groupByDate() {
        const g = {},
          ord = [];
        M.forEach((m) => {
          if (!g[m.date]) {
            g[m.date] = [];
            ord.push(m.date);
          }
          g[m.date].push(m);
        });
        return { g, ord };
      }

      // ─── WEEK NUMBER (Mon-Sun) ────────────────────────────────────────────────────
      function weekNum(dateStr) {
        const d = new Date(dateStr + "T12:00:00Z");
        const jan4 = new Date("2026-01-04T12:00:00Z"); // always in week 1
        const dayOfYear = (d - new Date("2025-12-29T12:00:00Z")) / 86400000;
        // Use ISO week
        const dow = (d.getUTCDay() + 6) % 7; // Mon=0
        const weekStart = new Date(d);
        weekStart.setUTCDate(d.getUTCDate() - dow);
        return weekStart.toISOString().slice(0, 10);
      }

      // ─── SUMMARY ─────────────────────────────────────────────────────────────────
      function updateSummary() {
        const { g, ord } = groupByDate();
        // Compute total hours and per-week hours for each engineer
        // based on per-match assignments + calcShift
        // We attribute hours proportionally: if a day has matches assigned to eng X,
        // engineer X gets the shift hours for matches they cover.
        // Since shifts are per-match, we compute a per-match "coverage window"
        // = 1h before KO + 2h match + 1h buffer = 4h per match, but capped by adjacent matches
        // Simpler: compute per-day shift, then distribute hours to engineers proportionally

        const totH = { N: 0, G: 0, H: 0 };
        const weekH = { N: {}, G: {}, H: {} };
        const dayCnt = { N: 0, G: 0, H: 0 };

        ord.forEach((date) => {
          const dm = g[date];
          const { start, end } = calcShift(dm);
          // Group matches by assigned engineer
          const byEng = {};
          dm.forEach((m) => {
            const e = A[m.id] || "";
            if (e) {
              if (!byEng[e]) byEng[e] = [];
              byEng[e].push(m);
            }
          });
          // For each engineer, compute their actual window within this day
          Object.entries(byEng).forEach(([eng, ms]) => {
            const ems = ms.map((m) => cm(m.bst));
            const first = Math.min(...ems);
            const last = Math.max(...ems);
            const stageOrder = [
              "Group",
              "R32",
              "R16",
              "QF",
              "SF",
              "3rd",
              "Final",
            ];
            const topStage = ms.reduce(
              (best, m) =>
                stageOrder.indexOf(m.stage) > stageOrder.indexOf(best)
                  ? m.stage
                  : best,
              "Group"
            );
            const dur = matchDur(topStage);
            const s = first - 60;
            const e2 = last + dur;
            const h = (e2 - s) / 60;
            totH[eng] = (totH[eng] || 0) + h;
            const wk = weekNum(date);
            if (!weekH[eng][wk]) weekH[eng][wk] = 0;
            weekH[eng][wk] += h;
            dayCnt[eng] = (dayCnt[eng] || 0) + 1;
          });
        });

        const maxH = Math.max(1, ...Object.values(totH));
        const html = ["N", "G", "H"]
          .map((k, i) => {
            const nm = ename(k);
            const h = totH[k] || 0;
            const weeks = Object.keys(weekH[k] || {});
            // Average hours per week where they have at least some coverage
            const avgH = weeks.length ? h / weeks.length : 0;
            const pct = ((h / maxH) * 100).toFixed(1);
            const fcls = ["fn", "fg2", "fh"][i];
            return `<div class="scard">
      <div class="scname"><span class="dot ${
        "dndgdh"
          .split("")
          .slice(i * 2, i * 2 + 2)
          .join("")[0] === "d"
          ? ["dn", "dg", "dhu"][i]
          : "dn"
      }"></span>${nm}</div>
      <div class="hrow"><span>Total shift hrs</span><b>${h.toFixed(
        1
      )}h</b></div>
      <div class="hbar"><div class="hfill ${fcls}" style="width:${pct}%"></div></div>
      <div class="hrow"><span>Active weeks</span><b>${weeks.length}</b></div>
      <div class="hrow"><span>Avg hrs/active week</span><b>${avgH.toFixed(
        1
      )}h</b></div>
      <div class="hrow"><span>Days with matches</span><b>${
        dayCnt[k] || 0
      }</b></div>
    </div>`;
          })
          .join("");
        document.getElementById("sumGrid").innerHTML = html;
      }

      // ─── STATS BAR ────────────────────────────────────────────────────────────────
      function updateStats() {
        const { g, ord } = groupByDate();
        const asgn = M.filter((m) => A[m.id]).length;
        let dual = 0;
        ord.forEach((date) => {
          const { dual: d } = calcShift(g[date]);
          if (d) dual++;
        });
        document.getElementById("s-total").textContent = M.length;
        document.getElementById("s-days").textContent = ord.length;
        document.getElementById("s-asgn").textContent = asgn;
        document.getElementById("s-dual").textContent = dual;
      }

      // ─── RENDER ───────────────────────────────────────────────────────────────────
      function koClass(bst) {
        const [h] = bst.split(":").map(Number);
        if (h < 10) return "deep"; // 00-09 overnight
        if (h >= 23) return "late"; // 23:xx
        if (h < 17) return "day";
        return "eve";
      }

      function stageBadge(s) {
        return `<span class="sbadge s${s}">${s}</span>`;
      }

      // ─── SHIFT CELL ───────────────────────────────────────────────────────────────
      // Computes the personal shift window for the engineer assigned to match m
      // = (first KO among their matches on that day) - 1h → (last KO) + matchDur
      function buildShiftCell(m, eng, dayMatches) {
        if (!eng)
          return `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);">—</span>`;
        const engMs = dayMatches.filter((x) => A[x.id] === eng);
        const koTimes = engMs.map((x) => cm(x.bst));
        const firstKO = Math.min(...koTimes);
        const lastKO = Math.max(...koTimes);
        // Use the highest-stage match duration among their assigned matches
        const stageOrder = ["Group", "R32", "R16", "QF", "SF", "3rd", "Final"];
        const topStage = engMs.reduce(
          (best, x) =>
            stageOrder.indexOf(x.stage) > stageOrder.indexOf(best)
              ? x.stage
              : best,
          "Group"
        );
        const dur = matchDur(topStage);
        const s = firstKO - 60;
        const e = lastKO + dur;
        const color = engColor(eng);
        return `<span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${color};white-space:nowrap;">${fmtMins(
          s
        )}–${fmtMins(e)}</span>`;
      }

      function renderAll() {
        const { g, ord } = groupByDate();
        const frag = ord
          .map((date) => {
            const dm = g[date];
            const { start, end, hours, dual } = calcShift(dm);
            const lbl = DATE_LABELS[date] || date;
            const shiftStr = `${fmtMins(start)}–${fmtMins(end)} BST`;
            const dualHtml = dual
              ? `<span class="dual-flag">⚠ DUAL (${hours.toFixed(1)}h)</span>`
              : ``;

            // Determine if all matches on this day are assigned to same eng (for day bg)
            const dayEngs = [
              ...new Set(dm.map((m) => A[m.id]).filter(Boolean)),
            ];
            const dayEng = dayEngs.length === 1 ? dayEngs[0] : null;

            const rows = dm
              .map((m) => {
                const eng = A[m.id] || "";
                const lateHtml = m.on
                  ? `<span class="late-tag">LATE</span>`
                  : "";
                const kc = koClass(m.bst);
                const tzStr = `${m.local} UTC${m.tz >= 0 ? "+" : ""}${m.tz}`;
                const shiftCell = buildShiftCell(m, eng, dm);
                return `<tr class="mr${eng ? " r" + eng : ""}" data-stage="${
                  m.stage
                }" data-eng="${eng || "none"}" data-search="${(
                  m.t1 +
                  " " +
                  m.t2 +
                  " " +
                  m.city +
                  " " +
                  m.venue
                ).toLowerCase()}">
        <td><span class="kt ${kc}">${m.bst}</span>${lateHtml}</td>
        <td class="hsm"><span class="ltime">${tzStr}</span></td>
        <td><span class="matchup">${m.t1}<span class="vs">vs</span>${
                  m.t2
                }</span></td>
        <td class="hsm"><span class="venue-t">${
          m.venue
        }</span><br><span class="city-t">${m.city}</span></td>
        <td class="hsm">${
          m.g !== "—" ? `<span class="gbadge">${m.g}</span>` : ""
        }${stageBadge(m.stage)}</td>
        <td>
          <select class="asel${eng ? " a" + eng : ""}" onchange="assignMatch(${
                  m.id
                },this.value,this)">
            <option value="">— assign —</option>
            <option value="N"${eng === "N" ? " selected" : ""}>${ename(
                  "N"
                )}</option>
            <option value="G"${eng === "G" ? " selected" : ""}>${ename(
                  "G"
                )}</option>
            <option value="H"${eng === "H" ? " selected" : ""}>${ename(
                  "H"
                )}</option>
          </select>
        </td>
        <td style="width:130px;">${buildMiniEpg(m)}</td>
        <td style="width:130px;">${shiftCell}</td>
      </tr>`;
              })
              .join("");

            return `<div class="day-block" data-date="${date}" data-eng="${
              dayEng || "mixed"
            }">
      <div class="dh">
        <div class="ddate">${lbl}</div>
        <div class="drange">${shiftStr}</div>
        <div class="dhours">${hours.toFixed(1)}h${dual ? "" : ""}</div>
        ${dualHtml}
        ${buildDayEpg(dm)}
        <div class="dcnt">${dm.length} match${dm.length > 1 ? "es" : ""}</div>
      </div>
      <table class="mt">
        <thead><tr>
          <th>KO (BST)</th>
          <th class="hsm">Local</th>
          <th>Match</th>
          <th class="hsm">Venue / City</th>
          <th class="hsm">Grp / Stage</th>
          <th>Engineer</th>
          <th>Timeline</th>
          <th>Shift</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
          })
          .join("");

        document.getElementById("mc").innerHTML = frag;
        updateStats();
        updateSummary();
        applyFilters();
      }

      function assignMatch(id, val, sel) {
        A[id] = val || "";
        const row = sel.closest("tr");
        row.className = `mr${val ? " r" + val : ""}`;
        row.dataset.eng = val || "none";
        sel.className = `asel${val ? " a" + val : ""}`;
        // Rebuild the mini EPG for this row
        const m = M.find((x) => x.id === id);
        const { g } = groupByDate();
        const dm = g[m.date];
        row.querySelector("td:nth-last-child(2)").innerHTML = buildMiniEpg(m);
        // Rebuild shift cell for ALL rows on this day (other engs' shifts may change too)
        const dayBlock = row.closest(".day-block");
        dayBlock.querySelectorAll(".mr").forEach((r) => {
          const rid = parseInt(
            r.querySelector("select").getAttribute("onchange").match(/\d+/)[0]
          );
          const rm = M.find((x) => x.id === rid);
          const reng = A[rid] || "";
          r.querySelector("td:last-child").innerHTML = buildShiftCell(
            rm,
            reng,
            dm
          );
        });
        // Rebuild day header EPG
        rebuildDayEpg(dayBlock);
        updateStats();
        updateSummary();
        schedSave();
      }

      function rebuildDayEpg(block) {
        const date = block.dataset.date;
        const { g } = groupByDate();
        const dm = g[date];
        const { start, end, hours, dual } = calcShift(dm);
        // Update shift label
        block.querySelector(".drange").textContent = `${fmtMins(
          start
        )}–${fmtMins(end)} BST`;
        block.querySelector(".dhours").textContent = `${hours.toFixed(1)}h`;
        // Replace EPG
        const old = block.querySelector(".epg-hdr-wrap");
        if (old) old.outerHTML = buildDayEpg(dm);
        // Update dual flag
        let df = block.querySelector(".dual-flag");
        if (dual && !df) {
          block
            .querySelector(".dhours")
            .insertAdjacentHTML(
              "afterend",
              `<span class="dual-flag">⚠ DUAL (${hours.toFixed(1)}h)</span>`
            );
        } else if (!dual && df) {
          df.remove();
        }
        // Update day eng for filter
        const dayEngs = [...new Set(dm.map((m) => A[m.id]).filter(Boolean))];
        block.dataset.eng = dayEngs.length === 1 ? dayEngs[0] : "mixed";
      }

      // ─── AUTO ASSIGN ──────────────────────────────────────────────────────────────
      function autoAssign() {
        // Assign round-robin by day, balancing total hours
        const { g, ord } = groupByDate();
        const totH = { N: 0, G: 0, H: 0 };
        ord.forEach((date) => {
          const dm = g[date];
          // pick eng with least hours
          const pick = ["N", "G", "H"].reduce((a, b) =>
            totH[a] <= totH[b] ? a : b
          );
          dm.forEach((m) => {
            if (!A[m.id]) A[m.id] = pick;
          });
          const { start, end } = calcShift(dm);
          totH[pick] += (end - start) / 60;
        });
        renderAll();
        schedSave();
      }

      function clearAll() {
        M.forEach((m) => delete A[m.id]);
        schedSave();
        renderAll();
      }

      // ─── RENAME ENGINEERS ────────────────────────────────────────────────────────
      function onRename() {
        document.getElementById("l0").textContent = ename("N");
        document.getElementById("l1").textContent = ename("G");
        document.getElementById("l2").textContent = ename("H");
        document.getElementById("fb-N").textContent = ename("N");
        document.getElementById("fb-G").textContent = ename("G");
        document.getElementById("fb-H").textContent = ename("H");
        // Update all selects
        document.querySelectorAll(".asel").forEach((s) => {
          const v = s.value;
          s.options[1].textContent = ename("N");
          s.options[2].textContent = ename("G");
          s.options[3].textContent = ename("H");
          s.value = v;
        });
        updateSummary();
        schedSave();
      }

      // ─── FILTERS ──────────────────────────────────────────────────────────────────
      let fStage = "all",
        fEng = "all";
      function applyFilters() {
        const q = document.getElementById("searchBox").value.toLowerCase();
        document.querySelectorAll(".day-block").forEach((block) => {
          const rows = [...block.querySelectorAll(".mr")];
          let vis = false;
          rows.forEach((r) => {
            const sok = fStage === "all" || r.dataset.stage === fStage;
            const eok =
              fEng === "all" ||
              (fEng === "none" && r.dataset.eng === "none") ||
              fEng === "dual" || // handled at block level
              fEng === r.dataset.eng;
            const qok = !q || r.dataset.search.includes(q);
            const show = sok && eok && qok;
            r.style.display = show ? "" : "none";
            if (show) vis = true;
          });
          // dual filter: show block if it has dual flag
          const dualOk =
            fEng !== "dual" || block.querySelector(".dual-flag") != null;
          block.style.display = vis && dualOk ? "" : "none";
        });
      }

      document.querySelectorAll(".fb[data-f]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const f = btn.dataset.f;
          document
            .querySelectorAll(`.fb[data-f="${f}"]`)
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          if (f === "stage") fStage = btn.dataset.v;
          if (f === "eng") fEng = btn.dataset.v;
          applyFilters();
        });
      });

      // ─── CSV EXPORT ───────────────────────────────────────────────────────────────
      function exportCSV() {
        const { g, ord } = groupByDate();
        const rows = [
          [
            "Date",
            "Shift Start BST",
            "Shift End BST",
            "Shift Hours",
            "Dual?",
            "ID",
            "KO BST",
            "Local KO",
            "Home",
            "Away",
            "City",
            "Stage",
            "Engineer",
            "Eng Shift BST",
          ],
        ];
        ord.forEach((date) => {
          const dm = g[date];
          const { start, end, hours, dual } = calcShift(dm);
          dm.forEach((m) => {
            const eng = A[m.id] || "";
            const engShift = eng
              ? buildShiftCell(m, eng, dm).replace(/<[^>]+>/g, "")
              : "";
            rows.push([
              DATE_LABELS[date],
              fmtMins(start),
              fmtMins(end),
              hours.toFixed(1),
              dual ? "YES" : "",
              m.id,
              m.bst,
              `${m.local} UTC${m.tz}`,
              m.t1,
              m.t2,
              m.city,
              m.stage,
              eng ? ename(eng) : "",
              engShift,
            ]);
          });
        });
        const csv = rows
          .map((r) =>
            r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")
          )
          .join("\n");
        const a = document.createElement("a");
        a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
        a.download = "wc2026_rota.csv";
        a.click();
      }

      // ─── INIT ────────────────────────────────────────────────────────────────────
      (async function () {
        CURRENT_USER = await fetchMe();
        applyRoleUI();
        await loadFromServer();
        renderAll();
        onRename();
      })();
    </script>
  </body>
</html>
