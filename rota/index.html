<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rota App</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f6fa; }
    h1 { margin-bottom: 10px; }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    button { padding: 6px 10px; margin: 2px; }
    input, select { padding: 5px; margin: 5px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>

<h1>Rota App</h1>

<div id="userInfo" class="card"></div>

<div id="membersCard" class="card">
  <h3>Team Members</h3>
  <table id="membersTable"></table>
</div>

<div id="leaveSubmitCard" class="card">
  <h3>Submit Leave</h3>
  <label>Start: <input type="date" id="start"></label><br>
  <label>End: <input type="date" id="end"></label><br>
  <label>Type:
    <select id="type">
      <option>Annual</option>
      <option>Sick</option>
      <option>Other</option>
    </select>
  </label><br>
  <button onclick="submitLeave()">Submit</button>
</div>

<div id="leaveCard" class="card">
  <h3>Leave Requests</h3>
  <table id="leaveTable"></table>
</div>

<script>
let currentUser = null;

async function api(path, opts = {}) {
  const res = await fetch(`/so-proxy${path}`, {
    headers: {'Content-Type': 'application/json'},
    ...opts
  });
  return res.json();
}

async function loadUser() {
  const data = await api('/rota/me');
  currentUser = data;

  document.getElementById('userInfo').innerHTML = `
    <b>User:</b> ${data.username}<br>
    <b>Role:</b> ${data.rota_role}<br>
    <b>Team:</b> ${data.team || '-'}
  `;

  if (data.rota_role === 'guest') {
    document.body.innerHTML += "<p>No rota access.</p>";
    return;
  }

  loadMembers();
  loadLeave();
}

async function loadMembers() {
  const data = await api('/rota/members');

  let html = "<tr><th>Name</th><th>Email</th><th>Team</th></tr>";
  for (const [user, m] of Object.entries(data.members)) {
    html += `
      <tr>
        <td>${m.name || user}</td>
        <td>${m.email || ''}</td>
        <td>${m.team}</td>
      </tr>`;
  }

  document.getElementById('membersTable').innerHTML = html;
}

async function loadLeave() {
  const data = await api('/rota/leave');

  let html = "<tr><th>User</th><th>Dates</th><th>Type</th><th>Status</th>";

  if (currentUser.rota_role === 'management') {
    html += "<th>Actions</th>";
  }

  html += "</tr>";

  data.leave.forEach((r, i) => {
    html += `
      <tr>
        <td>${r.username}</td>
        <td>${r.date_start} → ${r.date_end}</td>
        <td>${r.leave_type}</td>
        <td>${r.status}</td>
    `;

    if (currentUser.rota_role === 'management') {
      html += `
        <td>
          <button onclick="updateLeave(${i}, 'Approved')">Approve</button>
          <button onclick="updateLeave(${i}, 'Rejected')">Reject</button>
        </td>`;
    }

    html += "</tr>";
  });

  document.getElementById('leaveTable').innerHTML = html;
}

async function submitLeave() {
  const start = document.getElementById('start').value;
  const end   = document.getElementById('end').value;
  const type  = document.getElementById('type').value;

  const res = await api('/rota/leave', {
    method: 'POST',
    body: JSON.stringify({
      date_start: start,
      date_end: end,
      leave_type: type
    })
  });

  if (!res.ok) {
    alert(res.error);
    return;
  }

  loadLeave();
}

async function updateLeave(index, status) {
  await api(`/rota/leave/${index}`, {
    method: 'PUT',
    body: JSON.stringify({ status })
  });

  loadLeave();
}

loadUser();
</script>

</body>
</html>
