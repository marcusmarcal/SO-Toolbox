          isSched = view === "scheduled";
        $("sub-toolbar").style.display = isSched ? "" : "none"; // logs manages its own sub-toolbar
        $("log-controls").style.display = "none"; // hidden until logs are loaded
        $("sched-controls").style.display = isSched ? "flex" : "none";
        $("rmg-wrap").style.display = view === "channels" ? "" : "none";
        if (isLog) {
          // fetch suggestions then show form
          ensureLogSuggestions().then(showLogForm);
        }
      }

      // ── WIRING ────────────────────────────────────────────────────
      document.querySelectorAll("#dc-g .grp-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("#dc-g .grp-btn")
            .forEach((b) => b.classList.remove("adc"));
          btn.classList.add("adc");
          dc = btn.dataset.dc;
          hasData = false;
          logEvents = [];
          logSuggestCache = { nodes: [], channels: [] };
          load();
        })
      );
      document.querySelectorAll("#vw-g .grp-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("#vw-g .grp-btn")
            .forEach((b) => b.classList.remove("avw"));
          btn.classList.add("avw");
          view = btn.dataset.view;
          hasData = false;
          updateToolbarForView();
          if (view !== "logs") load(); // logs shows prompt, waits for explicit Fetch
        })
      );
      $("rb").addEventListener("click", load);
      $("fi").addEventListener("input", () => {
        if (hasData) renderView();
      });
      $("wo").addEventListener("change", () => {
        localStorage.setItem("warningsOnly", $("wo").checked ? "1" : "0");
        if (hasData) renderView();
      });
      $("ao").addEventListener("change", () => {
        localStorage.setItem("activeOnly", $("ao").checked ? "1" : "0");
        if (hasData) renderView();
      });
      $("rmg-only").addEventListener("change", () => {
        if (hasData) renderView();
      });

      document.querySelectorAll("#lvl-g .log-lvl").forEach((btn) =>
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("#lvl-g .log-lvl")
            .forEach((b) => (b.className = "log-lvl"));
          logLevel = btn.dataset.lvl;
          btn.classList.add(logLevel ? "a-" + logLevel : "a-all");
          if (hasData && view === "logs") renderLogs();
        })
      );
      $("lg").addEventListener("input", () => {
        if (hasData && view === "logs") renderLogs();
      });
      // "← New search" goes back to the form
      $("log-back-btn").addEventListener("click", () => {
        logEvents = [];
        hasData = false;
        logLevel = "";
        $("log-controls").style.display = "none";
        $("sub-toolbar").style.display = "none";
        ensureLogSuggestions().then(showLogForm);
      });

      document.querySelectorAll(".hz-btn").forEach((btn) =>
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".hz-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          schedHorizonDays = parseInt(btn.dataset.days) || 0;
          if (hasData) renderView();
        })
      );

      // restore checkbox state
      //try{$('ao').checked=localStorage.getItem('activeOnly')==='1';$('wo').checked=localStorage.getItem('warningsOnly')==='1';}catch{}

      // restore handled via URL init
      try {
      } catch {}

      // init sort state
      ["nodes", "running"].forEach((v) => {
        if (!sortState[v]) {
          sortState[v] = getSort(v);
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        setActiveViewButton();
        setActiveDCButton();
        updateToolbarForView();
        if (view !== "logs") {
          load();
        }
      });

      // auto-refresh 30s — skip logs (manual fetch only)
      setInterval(() => {
        if (hasData && view !== "logs") load();
      }, 30000);
    </script>
  </body>
</html>
