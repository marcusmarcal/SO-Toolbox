<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lowcoder App</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: Arial, sans-serif;
      }

      #container {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
      }

      #loginContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
      }

      #appFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
      }

      button {
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <!-- Tela de login -->
      <div id="loginContainer">
        <button onclick="loginSSO()">Login with SSO</button>
        <span>-- close popup if already logged in --</span>
      </div>

      <!-- Iframe -->
      <iframe id="appFrame" allowfullscreen></iframe>
    </div>

    <script>
      const APP_URL =
        "https://lowcoder-it.lc-platform.int.prod.ix.statsperform.cloud/apps/69c0e98415b33a52b44b69f0/view";

      const LOGIN_URL =
        "https://lowcoder-it.lc-platform.int.prod.ix.statsperform.cloud/org/685aa1e003530661de7d3587/auth/login";

      function loginSSO() {
        const popup = window.open(
          LOGIN_URL,
          "ssoLogin",
          "width=600,height=700"
        );

        const interval = setInterval(() => {
          if (popup.closed) {
            clearInterval(interval);
            loadIframe();
          }
        }, 500);
      }

      function loadIframe() {
        document.getElementById("loginContainer").style.display = "none";

        const iframe = document.getElementById("appFrame");
        iframe.style.display = "block";
        iframe.src = APP_URL;
      }
    </script>
  </body>
</html>
