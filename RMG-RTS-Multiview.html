<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMG RTS Multiview Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #080c10;
    --border: #21262d;
    --cyan:   #58a6ff;
    --text:   #c9d1d9;
    --muted:  #484f58;
    --mono:   'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    text-align: center;
    padding: 2.5rem 3rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #0d1117;
    max-width: 420px;
  }

  .icon { font-size: 2.5rem; margin-bottom: 1rem; }

  h1 {
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    margin-bottom: 0.5rem;
  }

  p {
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .btn {
    display: inline-block;
    background: var(--cyan);
    color: #000;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📺</div>
  <h1>RMG RTS Multiview Dashboard</h1>
  <p>This dashboard is hosted externally by PhenixRTS and cannot be embedded.<br>Click below to open it in a new tab.</p>
  <a class="btn" href="https://dashboard.phenixrts.app/dashboard?alias=bmB5UkQ9" target="_blank" rel="noopener">Open Dashboard ↗</a>
</div>
</body>
</html>
