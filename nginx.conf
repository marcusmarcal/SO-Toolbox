worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    include      nginx_http_defaults.conf;

    # ── SO-Toolbox — HTTPS ──────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        client_max_body_size 2G;

        root  /opt/web;
        index index.html;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Bloquear ficheiros sensíveis ─────────────────────────────
        location ~ ^/(\.env|users\.json) {
            deny all;
            return 404;
        }

        # ── Endpoint interno de validação de sessão ──────────────────
        # Chamado silenciosamente pelo auth_request antes de servir
        # ficheiros protegidos. Retorna 200 (ok) ou 401 (não autenticado).
        location = /so-proxy/_auth_check {
            internal;
            proxy_pass                 http://127.0.0.1:5050/me;
            proxy_pass_request_body    off;
            proxy_set_header           Content-Length "";
            proxy_set_header           X-Original-URI $request_uri;
            proxy_set_header           Cookie $http_cookie;
        }

        # ── Reverse proxy para Flask (port 5050) ─────────────────────
        # /so-proxy/* passa sempre direto — Flask gere a sua própria auth
        location /so-proxy/ {
            proxy_pass                 http://127.0.0.1:5050/;
            proxy_set_header           Host $host;
            proxy_set_header           X-Real-IP $remote_addr;
            proxy_set_header           X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_request_body    on;
            proxy_pass_request_headers on;
            # Required for SSE (Server-Sent Events) streaming
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         3600s;
            chunked_transfer_encoding  on;
        }

        # ── Páginas públicas (sem auth_request) ──────────────────────
        location = /login.html {
            root /opt/web;
        }

        location = /users-admin.html {
            root /opt/web;
        }

        # ── Tudo o resto — protegido por sessão (exceto localhost) ──
        location / {
            satisfy any;

            # Permitir acessos locais sem autenticação
            allow 127.0.0.1;
            allow ::1;

            # Para qualquer outro IP, exige autenticação
            deny all; 

            auth_request /so-proxy/_auth_check;
            error_page 401 = @login_redirect;

            try_files $uri $uri/ =404;
        }

        # ── Redirect para login (preserva destino em ?next=) ─────────
        location @login_redirect {
            return 302 /login.html?next=$request_uri;
        }
    }

    # ── Redirect HTTP → HTTPS ───────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
