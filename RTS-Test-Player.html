<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stats Perform RTS Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        line-height: 1.35;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #0f172a;
        color: #f8fafc; /* texto claro opcional */
      }

      .wrap {
        padding: 1.25rem 1.25rem 0.75rem;
      }

      .row {
        max-width: 2000px;
        margin: 0 auto;
      }

      /* ===== Header com logo à esquerda ===== */
      .header-grid {
        display: grid;
        grid-template-columns: minmax(160px, 260px) 1fr; /* coluna da logo | conteúdo */
        gap: 1.25rem;
        /* IMPORTANTE: permita que a linha tenha a altura do conteúdo e a célula da logo estique */
        align-items: stretch;
      }

      .brand {
        /* CENTRALIZAÇÃO TOTAL DA LOGO DENTRO DA COLUNA ESQUERDA */
        display: flex;
        align-items: center; /* centra verticalmente */
        justify-content: center; /* centra horizontalmente */
        padding: 0.25rem; /* leve respiro para não colar nas bordas */
      }

      .brand img {
        display: block;
        max-width: 235px; /* ajuste conforme necessário */
        height: auto;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      label {
        font-weight: 600;
        margin-bottom: 0.4rem;
        display: block;
      }

      /* Linha do input */
      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 0.9rem;
        align-items: center;
      }

      input[type="text"] {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #bbb;
        border-radius: 6px;
      }

      /* Espaço extra entre input e botões */
      .controls + .controls-spacer {
        height: 0.35rem;
      }

      .buttons {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.6rem;
      }

      button {
        background: #0a66c2;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 0.6rem 1rem;
        cursor: pointer;
        font-size: 1rem;
        white-space: nowrap;
      }
      button.secondary {
        background: #666;
      }

      .msg {
        min-height: 1.2em;
        margin-top: 0.45rem;
        font-size: 0.95rem;
      }
      .error {
        color: #b00020;
      }
      .ok {
        color: #1b5e20;
      }

      /* Viewer ocupa o restante da altura */
      .viewer-container {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #f2f2f2;
      }

      /* ===== Responsivo ===== */
      @media (max-width: 820px) {
        .header-grid {
          grid-template-columns: 1fr; /* empilha: logo em cima, conteúdo abaixo */
          gap: 0.9rem;
        }
        .brand {
          justify-content: center;
        } /* mantém a logo centralizada no topo */
        .controls {
          grid-template-columns: 1fr;
        }
        .buttons {
          margin-top: 0.75rem;
        }
        button {
          width: 100%;
        }
        .brand img {
          max-width: 160px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <!-- Cabeçalho com logo centralizada na coluna esquerda -->
        <div class="header-grid">
          <div class="header-content">
            <h1>RTS Viewer Loader</h1>
            <label for="token">View token</label>

            <!-- Input -->
            <div class="controls">
              <input
                type="text"
                id="token"
                name="token"
                placeholder="Paste your token here"
                autocomplete="off"
              />
            </div>

            <!-- Espaçador -->
            <div class="controls-spacer"></div>

            <!-- Botões -->
            <div class="buttons">
              <button id="loadBtn">Load</button>
              <button id="openTabBtn" class="secondary">Open in new tab</button>
            </div>

            <div id="feedback" class="msg"></div>
          </div>
        </div>
        <!-- /header-grid -->
      </div>
    </div>

    <!-- Viewer ocupa a área restante -->
    <div class="viewer-container">
      <iframe
        id="viewerFrame"
        title="Phenix Viewer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      >
      </iframe>
    </div>

    <script>
      (function () {
        const BASE =
          "https://phenix-techops-samples.pages.dev/ReactChannelViewer/dist/";
        const tokenInput = document.getElementById("token");
        const loadBtn = document.getElementById("loadBtn");
        const openTabBtn = document.getElementById("openTabBtn");
        const feedback = document.getElementById("feedback");
        const frame = document.getElementById("viewerFrame");

        function buildUrl(rawToken) {
          const trimmed = (rawToken ?? "").trim();
          if (!trimmed) {
            return { ok: false, msg: "Please enter a token.", url: "" };
          }
          const encoded = encodeURIComponent(trimmed);
          const url = `${BASE}?token=${encoded}&showCharts=true`;
          return { ok: true, msg: "", url };
        }

        function clearMsg() {
          feedback.textContent = "";
          feedback.className = "msg";
        }

        // Carrega no iframe
        loadBtn.addEventListener("click", () => {
          clearMsg();
          const { ok, msg, url } = buildUrl(tokenInput.value);
          if (!ok) {
            feedback.className = "msg error";
            feedback.textContent = msg;
            frame.removeAttribute("src");
            return;
          }
          try {
            frame.src = url;
            feedback.className = "msg ok";
            feedback.textContent = "Loading viewer in the frame…";
          } catch (e) {
            feedback.className = "msg error";
            feedback.textContent =
              "Failed to load in the frame. The site may block embedding. Try 'Open in new tab'.";
          }
        });

        // Abre em nova aba
        openTabBtn.addEventListener("click", () => {
          clearMsg();
          const { ok, msg, url } = buildUrl(tokenInput.value);
          if (!ok) {
            feedback.className = "msg error";
            feedback.textContent = msg;
            return;
          }
          window.open(url, "_blank", "noopener");
        });

        clearMsg();
      })();
    </script>
  </body>
</html>
