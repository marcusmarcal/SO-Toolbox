<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingest Analyzer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }
      .header h1 {
        margin-bottom: 10px;
        font-size: 2.5em;
      }
      .content {
        padding: 30px;
        max-height: calc(100vh - 200px);
        overflow-y: auto;
      }
      .upload-section {
        background: #f8f9fa;
        padding: 25px;
        border-radius: 8px;
        border: 2px dashed #667eea;
        text-align: center;
        margin-bottom: 20px;
      }
      .upload-area {
        padding: 40px;
        border: 2px dashed #667eea;
        border-radius: 8px;
        background: #f0f4ff;
        cursor: pointer;
        transition: all 0.3s;
      }
      .upload-area:hover {
        background: #e8ecff;
        border-color: #764ba2;
      }
      .upload-area.dragover {
        background: #e0e8ff;
        border-color: #764ba2;
        transform: scale(1.02);
      }
      .upload-area h3 {
        color: #667eea;
        margin-bottom: 10px;
      }
      input[type="file"] {
        display: none;
      }
      button {
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
        margin: 5px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      .btn-clear {
        background: #ff6b6b;
        color: white;
      }
      .btn-clear:hover {
        background: #ff5252;
      }
      .file-list {
        background: white;
        border-radius: 5px;
        padding: 15px;
        margin-top: 20px;
      }
      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
      .file-item:last-child {
        border-bottom: none;
      }
      .results {
        background: white;
        border-radius: 5px;
        padding: 20px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📡 Ingest Analyzer</h1>
        <p>Upload and analyze .TS files</p>
      </div>

      <div class="content">
        <div class="upload-section">
          <div
            class="upload-area"
            id="uploadArea"
            onclick="document.getElementById('fileInput').click()"
          >
            <h3>📁 Upload .TS File</h3>
            <p>Click or drag and drop .ts files here</p>
            <input
              type="file"
              id="fileInput"
              accept=".ts"
              multiple
              onchange="handleFiles(event)"
            />
          </div>
          <button class="btn-primary" onclick="analyzeFiles()">Analyze</button>
          <button class="btn-clear" onclick="clearFiles()">Clear</button>
        </div>

        <div class="file-list" id="fileList" style="display: none">
          <h3>Selected Files:</h3>
          <div id="fileItems"></div>
        </div>

        <div class="results" id="results" style="display: none">
          <h3>Analysis Results</h3>
          <div id="resultsContent"></div>
        </div>
      </div>
    </div>

    <script>
      let selectedFiles = [];

      const uploadArea = document.getElementById("uploadArea");

      // Drag and drop
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });

      uploadArea.addEventListener("dragleave", () => {
        uploadArea.classList.remove("dragover");
      });

      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        handleFiles({ target: { files: e.dataTransfer.files } });
      });

      function handleFiles(event) {
        selectedFiles = Array.from(event.target.files);
        displayFileList();
      }

      function displayFileList() {
        if (selectedFiles.length === 0) {
          document.getElementById("fileList").style.display = "none";
          return;
        }

        const fileList = document.getElementById("fileList");
        const fileItems = document.getElementById("fileItems");
        fileItems.innerHTML = selectedFiles
          .map(
            (file, index) => `
                <div class="file-item">
                    <span>${file.name} (${(file.size / 1024 / 1024).toFixed(
              2
            )} MB)</span>
                    <button class="btn-clear" onclick="removeFile(${index})">Remove</button>
                </div>
            `
          )
          .join("");
        fileList.style.display = "block";
      }

      function removeFile(index) {
        selectedFiles.splice(index, 1);
        displayFileList();
      }

      function clearFiles() {
        selectedFiles = [];
        document.getElementById("fileInput").value = "";
        document.getElementById("fileList").style.display = "none";
        document.getElementById("results").style.display = "none";
      }

      function analyzeFiles() {
        if (selectedFiles.length === 0) {
          alert("Please select files to analyze");
          return;
        }

        // Mock analysis
        const resultsContent = document.getElementById("resultsContent");
        resultsContent.innerHTML = selectedFiles
          .map(
            (file) => `
                <div style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                    <strong>${file.name}</strong><br>
                    Size: ${(file.size / 1024 / 1024).toFixed(2)} MB<br>
                    Status: ✅ Analyzed Successfully
                </div>
            `
          )
          .join("");

        document.getElementById("results").style.display = "block";
      }
    </script>
  </body>
</html>
