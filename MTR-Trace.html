<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTR — Network Trace</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080c10;
    --bg2:     #0d1117;
    --bg3:     #161b22;
    --border:  #21262d;
    --green:   #3fb950;
    --green-d: #1a3d20;
    --cyan:    #58a6ff;
    --yellow:  #e3b341;
    --red:     #f85149;
    --text:    #c9d1d9;
    --muted:   #484f58;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Barlow', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    overflow: hidden;
  }

  /* ── Full-height layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 1rem 1.25rem 1rem;
    gap: 0.75rem;
  }

  /* ── Header bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.75rem;
  }
  .topbar h1 {
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .topbar h1 span { color: var(--green); }
  .topbar-sub {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Server info pills ── */
  .server-info {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-left: auto;
  }
  .info-pill {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    white-space: nowrap;
  }
  .info-pill span { color: var(--cyan); }

  /* ── Form row ── */
  .form-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .field { display: flex; flex-direction: column; gap: 0.3rem; }
  .field.grow { flex: 1; min-width: 200px; }
  .field.w100 { width: 90px; }

  label {
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="text"],
  input[type="number"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.7rem;
    color: #fff;
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus { border-color: var(--cyan); }

  /* Toggle */
  .toggle-wrap { display: flex; flex-direction: column; gap: 0.3rem; }
  .toggle {
    display: flex; align-items: center; gap: 0.45rem;
    cursor: pointer; user-select: none;
    height: 36px;
  }
  .toggle input { display: none; }
  .toggle-track {
    width: 32px; height: 17px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 999px;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--green-d); border-color: var(--green); }
  .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(15px); background: var(--green); }
  .toggle-label { font-family: var(--mono); font-size: 0.72rem; color: var(--text); }

  /* Buttons */
  .btn-run {
    background: var(--green); color: #000;
    border: none; border-radius: 6px;
    padding: 0.5rem 1.2rem;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 700;
    letter-spacing: 0.05em; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap; align-self: flex-end; height: 36px;
  }
  .btn-run:hover { opacity: 0.85; }
  .btn-run:active { transform: scale(0.97); }
  .btn-run:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-stop {
    background: transparent; color: var(--red);
    border: 1px solid var(--red); border-radius: 6px;
    padding: 0.5rem 1rem;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; height: 36px;
    display: none; align-self: flex-end;
    transition: background 0.15s;
  }
  .btn-stop:hover { background: rgba(248,81,73,0.1); }
  .btn-stop.visible { display: flex; align-items: center; }

  /* ── Output area ── */
  .output-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .output-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.45rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg3);
  }

  .status-label {
    display: flex; align-items: center; gap: 0.45rem;
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  .dot.running { background: var(--yellow); animation: blink 0.8s ease-in-out infinite; }
  .dot.ok      { background: var(--green); animation: none; }
  .dot.err     { background: var(--red);   animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px; color: var(--muted);
    font-family: var(--mono); font-size: 0.62rem; font-weight: 700;
    letter-spacing: 0.08em; padding: 0.25rem 0.65rem;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-copy:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn-copy:disabled { opacity: 0.3; cursor: not-allowed; }

  #output {
    flex: 1;
    width: 100%;
    min-height: 0;
    resize: none;
    background: transparent;
    border: none;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.78rem;
    line-height: 1.7;
    outline: none;
    white-space: pre;
    overflow: auto;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <h1>MTR <span>//</span> Network Trace</h1>
    <span class="topbar-sub">runs server-side</span>
    <div class="server-info">
      <div class="info-pill">Source IP: <span id="pill-local">—</span></div>
      <div class="info-pill">Public IP: <span id="pill-public">—</span></div>
      <div class="info-pill">Gateway: <span id="pill-gw">—</span></div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-row">
    <div class="field grow">
      <label>Destination Host / IP</label>
      <input id="inp-host" type="text" placeholder="e.g. 8.8.8.8 or example.com" autocomplete="off" />
    </div>
    <div class="field w100">
      <label>Packets</label>
      <input id="inp-count" type="number" value="50" min="1" max="200" />
    </div>
    <div class="toggle-wrap">
      <label>No DNS</label>
      <label class="toggle">
        <input type="checkbox" id="chk-nodns" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Disable name resolution</span>
      </label>
    </div>
    <button class="btn-run" id="btn-run" onclick="runMtr()">▶ Run MTR</button>
    <button class="btn-stop" id="btn-stop" onclick="stopMtr()">■ Stop</button>
  </div>

  <!-- Output -->
  <div class="output-wrap">
    <div class="output-toolbar">
      <div class="status-label">
        <span class="dot" id="dot"></span>
        <span id="status-text">Ready</span>
      </div>
      <button class="btn-copy" id="btn-copy" onclick="copyOutput()" disabled>Copy</button>
    </div>
    <textarea id="output" readonly placeholder="MTR output will appear here..."></textarea>
  </div>

</div>

<script>
  const PROXY = "/phenix-proxy";
  let es = null; // EventSource

  // ── Load server info on boot ─────────────────────────────────────
  async function loadServerInfo() {
    try {
      const res  = await fetch(`${PROXY}/server-info`);
      const data = await res.json();

      // Primary non-loopback IP from ip addr output
      const ipMatch = (data.ip_addr || "").match(/inet (\d+\.\d+\.\d+\.\d+)(?!.*127\.0\.0\.1)/g);
      const localIp = ipMatch
        ? ipMatch.map(s => s.replace("inet ", "")).filter(ip => !ip.startsWith("127."))[0] || "—"
        : "—";

      // Gateway from default route
      const gwMatch = (data.default_route || "").match(/via (\S+)/);
      const gw = gwMatch ? gwMatch[1] : "—";

      document.getElementById("pill-local").textContent  = localIp;
      document.getElementById("pill-public").textContent = data.public_ip || "—";
      document.getElementById("pill-gw").textContent     = gw;
    } catch (e) {
      document.getElementById("pill-local").textContent = "unavailable";
    }
  }

  // ── MTR streaming ────────────────────────────────────────────────
  function runMtr() {
    const host   = document.getElementById("inp-host").value.trim();
    const count  = parseInt(document.getElementById("inp-count").value) || 50;
    const no_dns = document.getElementById("chk-nodns").checked ? "1" : "0";

    if (!host) { setStatus("err", "Please enter a host or IP."); return; }

    if (es) { es.close(); es = null; }

    const output = document.getElementById("output");
    const localIp  = document.getElementById("pill-local").textContent;
    const publicIp = document.getElementById("pill-public").textContent;

    // Header block
    const now = new Date().toISOString().replace("T", " ").slice(0, 19) + " UTC";
    output.value = [
      `MTR Network Trace`,
      `==========================================`,
      `Date      : ${now}`,
      `Source    : ${localIp} (public: ${publicIp})`,
      `Destination: ${host}`,
      `Packets   : ${count}`,
      `DNS       : ${no_dns === "1" ? "disabled" : "enabled"}`,
      `==========================================`,
      ``
    ].join("\n");

    document.getElementById("btn-run").disabled = true;
    document.getElementById("btn-stop").classList.add("visible");
    document.getElementById("btn-copy").disabled = true;
    setStatus("running", `Tracing route to ${host}...`);

    const url = `${PROXY}/mtr/stream?host=${encodeURIComponent(host)}&count=${count}&no_dns=${no_dns}`;
    es = new EventSource(url);

    es.onmessage = (e) => {
      if (e.data === "__DONE__") {
        es.close(); es = null;
        const failed = output.value.includes("ERROR");
        setStatus(failed ? "err" : "ok", failed ? "Error" : "Done");
        document.getElementById("btn-run").disabled = false;
        document.getElementById("btn-stop").classList.remove("visible");
        document.getElementById("btn-copy").disabled = false;
        return;
      }
      output.value += e.data + "\n";
      output.scrollTop = output.scrollHeight;
    };

    es.onerror = () => {
      es.close(); es = null;
      setStatus("err", "Connection lost.");
      document.getElementById("btn-run").disabled = false;
      document.getElementById("btn-stop").classList.remove("visible");
    };
  }

  function stopMtr() {
    if (es) { es.close(); es = null; }
    setStatus("err", "Stopped by user.");
    document.getElementById("btn-run").disabled = false;
    document.getElementById("btn-stop").classList.remove("visible");
    document.getElementById("btn-copy").disabled = false;
  }

  function setStatus(type, msg) {
    document.getElementById("dot").className        = "dot " + type;
    document.getElementById("status-text").textContent = msg;
  }

  async function copyOutput() {
    const val = document.getElementById("output").value;
    if (!val) return;
    try { await navigator.clipboard.writeText(val); }
    catch { document.getElementById("output").select(); document.execCommand("copy"); }
    const btn = document.getElementById("btn-copy");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 2000);
  }

  document.getElementById("inp-host").addEventListener("keydown", e => {
    if (e.key === "Enter") runMtr();
  });

  loadServerInfo();
</script>
</body>
</html>
