<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhenixRTS — Channel Health Monitor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset & Base ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e13;
        --bg2: #111720;
        --bg3: #1a2230;
        --border: #1e2d40;
        --cyan: #00d4ff;
        --cyan-dim: #007a99;
        --green: #00e676;
        --green-dim: #004d26;
        --red: #ff3d5a;
        --red-dim: #4d0012;
        --orange: #ff9100;
        --orange-dim: #5e3a00;
        --text: #c8d8e8;
        --text-dim: #506070;
        --font-mono: "IBM Plex Mono", monospace;
        --font-sans: "IBM Plex Sans", sans-serif;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        overflow: hidden;
      }

      /* ── Login Screen ───────────────────────────────────────────── */
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(
            ellipse 80% 60% at 50% 0%,
            #00d4ff12 0%,
            transparent 70%
          ),
          var(--bg);
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2.5rem;
        box-shadow: 0 0 60px #00d4ff08;
      }

      .login-title {
        font-family: var(--font-mono);
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.2rem;
      }
      .field label {
        display: block;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      .field input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 0.6rem 0.8rem;
        color: #fff;
        font-family: var(--font-mono);
        outline: none;
      }

      .btn {
        width: 100%;
        background: var(--cyan);
        color: #000;
        border: none;
        border-radius: 3px;
        padding: 0.7rem;
        font-family: var(--font-mono);
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
      }

      /* ── Dashboard ──────────────────────────────────────────────── */
      #dashboard {
        display: none;
        flex-direction: column;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        height: 50px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
      }

      .topbar-brand {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 700;
        color: var(--cyan);
      }

      .stat-pill {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
      }
      .stat-pill span {
        color: var(--cyan);
        font-weight: 600;
      }

      #pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }
      #pulse.idle {
        background: var(--text-dim);
        box-shadow: none;
      }

      /* Toolbar (Filters & Pagination) */
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 1.5rem;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .search-input {
        background: var(--bg3);
        border: 1px solid var(--border);
        color: #fff;
        padding: 5px 10px;
        font-family: var(--font-mono);
        font-size: 12px;
        width: 250px;
        border-radius: 3px;
      }

      .btn-sm {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 3px 10px;
        font-family: var(--font-mono);
        font-size: 10px;
        cursor: pointer;
        border-radius: 2px;
      }
      .btn-sm:hover:not(:disabled) {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .btn-sm:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* Table Area */
      .table-wrap {
        flex: 1;
        overflow-y: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--bg2);
        color: var(--cyan);
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 10px 1.5rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
      }
      tbody tr:hover {
        background: var(--bg2);
      }
      tbody td {
        padding: 10px 1.5rem;
        font-family: var(--font-mono);
        font-size: 13px;
      }

      /* Status Icons */
      .pub-icons-container {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      .pub-icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .pub-icon.active {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      .pub-icon.warning {
        background: var(--orange);
        box-shadow: 0 0 10px var(--orange);
        animation: blink 1s infinite;
      }
      .pub-icon.inactive {
        background: var(--red-dim);
        border: 1px solid var(--red);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .badge {
        padding: 2px 8px;
        border-radius: 2px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .badge.active {
        background: var(--green-dim);
        color: var(--green);
      }
      .badge.warning {
        background: var(--orange-dim);
        color: var(--orange);
      }
      .badge.inactive {
        background: var(--red-dim);
        color: var(--red);
      }

      .btn-sm.update:hover { border-color: var(--cyan); color: var(--cyan); }

      /* ── Git Pull Modal ─────────────────────────────────────────── */
      #git-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: #000a;
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #git-modal.open { display: flex; }
      .git-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1.5rem 2rem;
        width: 480px;
        max-width: 90vw;
      }
      .git-card-title {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 700;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .git-output {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 0.8rem 1rem;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text);
        white-space: pre-wrap;
        min-height: 60px;
        margin-bottom: 1rem;
      }
      .git-output.ok  { color: var(--green); }
      .git-output.err { color: var(--red); }
        padding: 50px;
        text-align: center;
        color: var(--text-dim);
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <div class="login-title">PHENIX MONITOR</div>
        <div class="field">
          <label>App ID</label>
          <input id="inp-appid" type="text" placeholder="your-app-id" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="inp-password" type="password" placeholder="••••••••" />
        </div>
        <div class="field">
          <label>Refresh Interval (seconds)</label>
          <input id="inp-interval" type="number" value="5" min="2" />
        </div>
        <div
          id="login-error"
          style="
            color: var(--red);
            font-size: 12px;
            margin-bottom: 15px;
            min-height: 1em;
          "
        ></div>
        <button class="btn" onclick="connect()">Connect</button>
      </div>
    </div>

    <div id="dashboard">
      <div class="topbar">
        <div class="topbar-brand">
          PHENIX SYSTEM MONITOR —
          <span id="sb-appid" style="color: var(--text-dim)"></span>
        </div>
        <div style="display: flex; gap: 20px; align-items: center">
          <div class="stat-pill">Total: <span id="stat-total">—</span></div>
          <div class="stat-pill">
            Healthy: <span id="stat-active" style="color: var(--green)">—</span>
          </div>
          <div class="stat-pill">
            Critical: <span id="stat-offline" style="color: var(--red)">—</span>
          </div>
          <div id="pulse" class="idle"></div>
          <button class="btn-sm" onclick="gitPull()">⟳ UPDATE</button>
          <button class="btn-sm" onclick="disconnect()">LOGOUT</button>
        </div>
      </div>

      <div class="toolbar">
        <div style="display: flex; gap: 20px; align-items: center">
          <input
            type="text"
            id="search-box"
            class="search-input"
            placeholder="Search by name..."
            oninput="handleFilterChange()"
          />
          <label
            style="
              font-family: var(--font-mono);
              font-size: 11px;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 5px;
            "
          >
            <input
              type="checkbox"
              id="filter-active"
              onchange="handleFilterChange()"
            />
            ONLY ACTIVE
          </label>
        </div>
        <div
          id="pagination-controls"
          style="
            font-family: var(--font-mono);
            font-size: 11px;
            display: flex;
            gap: 10px;
            align-items: center;
          "
        >
          <button class="btn-sm" id="btn-prev" onclick="changePage(-1)">
            PREV
          </button>
          <span
            >PAGE <span id="curr-page">1</span> /
            <span id="total-pages">1</span></span
          >
          <button class="btn-sm" id="btn-next" onclick="changePage(1)">
            NEXT
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CHANNEL NAME</th>
              <th>EVENT ID (ALIAS)</th>
              <th>CREATED</th>
              <th style="text-align: center">PUBLISHERS (PRI/BCK)</th>
              <th style="text-align: center">STATUS</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="5" class="table-message">Connecting...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        style="
          padding: 5px 1.5rem;
          background: var(--bg2);
          border-top: 1px solid var(--border);
          font-family: var(--font-mono);
          font-size: 10px;
          color: var(--text-dim);
          display: flex;
          justify-content: space-between;
        "
      >
        <div>Last Sync: <span id="last-update">—</span></div>
        <div id="next-refresh">Next update in —s</div>
      </div>
    </div>

    <!-- ── Git Pull Modal ──────────────────────────────────────────── -->
    <div id="git-modal">
      <div class="git-card">
        <div class="git-card-title">⟳ Update from Git</div>
        <div id="git-output" class="git-output">Running git pull...</div>
        <button class="btn-sm" onclick="closeGitModal()">Close</button>
      </div>
    </div>

    <script>
      async function gitPull() {
        const modal = document.getElementById("git-modal");
        const output = document.getElementById("git-output");
        output.textContent = "Running git pull...";
        output.className = "git-output";
        modal.classList.add("open");

        try {
          const res = await fetch(`${PROXY}/git-pull`, {
            method: "POST",
            headers: headers(),
          });
          const data = await res.json();
          output.textContent = data.output || "(no output)";
          output.classList.add(data.success ? "ok" : "err");
        } catch (e) {
          output.textContent = `Error: ${e.message}`;
          output.classList.add("err");
        }
      }

      function closeGitModal() {
        document.getElementById("git-modal").classList.remove("open");
      }

      const PROXY = "/so-proxy";

      let appId, password, interval, timer, countdown;
      let secondsLeft = 0;
      let globalChannels = [];
      let globalState = {};
      let currentPage = 1;
      const itemsPerPage = 50;

      function headers() {
        return { "X-App-Id": appId, "X-Password": password };
      }

      async function connect() {
        appId = document.getElementById("inp-appid").value.trim();
        password = document.getElementById("inp-password").value;
        interval = parseInt(document.getElementById("inp-interval").value) || 5;

        if (!appId || !password) return;

        const errDiv = document.getElementById("login-error");
        errDiv.textContent = "";

        try {
          const res = await fetch(`${PROXY}/channels`, { headers: headers() });
          if (!res.ok) throw new Error("Invalid credentials or Proxy error.");

          document.getElementById("login-screen").style.display = "none";
          document.getElementById("dashboard").style.display = "flex";
          document.getElementById("sb-appid").textContent = appId;

          startMonitor();
        } catch (e) {
          errDiv.textContent = e.message;
        }
      }

      function disconnect() {
        clearInterval(timer);
        clearInterval(countdown);

        // Clear data
        globalChannels = [];
        globalState = {};
        currentPage = 1;

        // Clear UI
        document.getElementById("table-body").innerHTML =
          '<tr><td colspan="3" class="table-message">Connecting...</td></tr>';
        document.getElementById("stat-total").textContent = "—";
        document.getElementById("stat-active").textContent = "—";
        document.getElementById("stat-offline").textContent = "—";
        document.getElementById("search-box").value = "";
        document.getElementById("filter-active").checked = false;

        document.getElementById("dashboard").style.display = "none";
        document.getElementById("login-screen").style.display = "flex";
      }

      function startMonitor() {
        fetchData();
        timer = setInterval(fetchData, interval * 1000);
        countdown = setInterval(() => {
          secondsLeft = Math.max(0, secondsLeft - 1);
          document.getElementById(
            "next-refresh"
          ).textContent = `Next update in ${secondsLeft}s`;
        }, 1000);
      }

      async function fetchData() {
        document.getElementById("pulse").classList.remove("idle");
        secondsLeft = interval;

        try {
          const res = await fetch(`${PROXY}/channels`, { headers: headers() });
          const data = await res.json();
          globalChannels = (
            Array.isArray(data) ? data : data.channels || []
          ).sort((a, b) =>
            a.name.localeCompare(b.name, undefined, { numeric: true })
          );

          // PROCESSAMENTO EM LOTES (CHUNKS)
          const chunkSize = 50; // Processa 50 por vez para não travar o proxy
          for (let i = 0; i < globalChannels.map.length; i += chunkSize) {
            const chunk = globalChannels.slice(i, i + chunkSize);

            await Promise.all(
              chunk.map(async (ch) => {
                try {
                  const r = await fetch(
                    `${PROXY}/publishers/count/${encodeURIComponent(
                      ch.channelId
                    )}`,
                    { headers: headers() }
                  );
                  const txt = await r.text();
                  globalState[ch.channelId] = parseInt(txt) || 0;
                } catch {
                  globalState[ch.channelId] = 0;
                }
              })
            );

            // Atualiza a tabela parcialmente para o usuário ver progresso
            render();
          }

          updateStats();
          document.getElementById("last-update").textContent =
            new Date().toLocaleTimeString();
        } catch (e) {
          console.error("Sync error:", e);
        }

        document.getElementById("pulse").classList.add("idle");
      }

      function handleFilterChange() {
        currentPage = 1;
        render();
      }

      function changePage(step) {
        currentPage += step;
        render();
      }

      function render() {
        const tbody = document.getElementById("table-body");
        const searchTerm = document
          .getElementById("search-box")
          .value.toLowerCase();
        const onlyActive = document.getElementById("filter-active").checked;

        // 1. Filter
        let filtered = globalChannels.filter((ch) => {
          const matchesSearch = ch.name.toLowerCase().includes(searchTerm);
          const count = globalState[ch.channelId] || 0;
          const matchesActive = onlyActive ? count > 0 : true;
          return matchesSearch && matchesActive;
        });

        // 2. Pagination
        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        document.getElementById("curr-page").textContent = currentPage;
        document.getElementById("total-pages").textContent = totalPages;
        document.getElementById("btn-prev").disabled = currentPage === 1;
        document.getElementById("btn-next").disabled =
          currentPage === totalPages;

        const start = (currentPage - 1) * itemsPerPage;
        const paginated = filtered.slice(start, start + itemsPerPage);

        // 3. Render
        tbody.innerHTML = "";
        if (paginated.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="table-message">No channels found matching criteria.</td></tr>';
          return;
        }

        paginated.forEach((ch) => {
          const count = globalState[ch.channelId] || 0;
          let icons, badge;

          if (count >= 2) {
            icons =
              '<div class="pub-icon active"></div><div class="pub-icon active"></div>';
            badge = '<span class="badge active">Healthy</span>';
          } else if (count === 1) {
            icons =
              '<div class="pub-icon warning"></div><div class="pub-icon inactive"></div>';
            badge = '<span class="badge warning">No Backup</span>';
          } else {
            icons =
              '<div class="pub-icon inactive"></div><div class="pub-icon inactive"></div>';
            badge = '<span class="badge inactive">Offline</span>';
          }

          const tr = document.createElement("tr");
          const createdDate = ch.created
            ? new Date(ch.created).toLocaleString("en-GB", {
                dateStyle: "short",
                timeStyle: "short",
              })
            : "—";
          tr.innerHTML = `
      <td style="color:#fff; font-weight:600;">${ch.name}</td>
      <td style="color:var(--text-dim);">${ch.alias || "—"}</td>
      <td style="color:var(--text-dim); white-space:nowrap;">${createdDate}</td>
      <td style="text-align:center"><div class="pub-icons-container">${icons}</div></td>
      <td style="text-align:center">${badge}</td>
    `;
          tbody.appendChild(tr);
        });
      }

      function updateStats() {
        const total = globalChannels.length;
        const active = globalChannels.filter(
          (c) => globalState[c.channelId] > 0
        ).length;
        const offline = total - active;

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-active").textContent = active;
        document.getElementById("stat-offline").textContent = offline;
      }
    </script>
  </body>
</html>
