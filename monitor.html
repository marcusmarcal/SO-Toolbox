<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhenixRTS — Smart Monitor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0e13;
        --bg2: #111720;
        --bg3: #1a2230;
        --border: #1e2d40;
        --cyan: #00d4ff;
        --green: #00e676;
        --green-dim: #004d26;
        --red: #ff3d5a;
        --red-dim: #4d0012;
        --orange: #ff9100;
        --orange-dim: #5e3a00;
        --text: #c8d8e8;
        --text-dim: #506070;
        --font-mono: "IBM Plex Mono", monospace;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", sans-serif;
        overflow: hidden;
      }

      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .login-card {
        width: 400px;
        background: var(--bg2);
        border: 1px solid var(--border);
        padding: 2rem;
        border-radius: 4px;
      }
      .field {
        margin-bottom: 1rem;
      }
      .field label {
        display: block;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--cyan);
        margin-bottom: 4px;
      }
      .field input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        padding: 8px;
        color: #fff;
        outline: none;
      }
      .btn {
        width: 100%;
        background: var(--cyan);
        border: none;
        padding: 10px;
        font-weight: 700;
        cursor: pointer;
      }

      #dashboard {
        display: none;
        flex-direction: column;
        height: 100vh;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        height: 50px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 1.5rem;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .table-wrap {
        flex: 1;
        overflow-y: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--bg2);
        color: var(--cyan);
        font-size: 10px;
        padding: 10px 1.5rem;
        text-align: left;
      }
      tbody td {
        padding: 12px 1.5rem;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
      }

      .pub-icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .pub-icon.active {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      .pub-icon.warning {
        background: var(--orange);
        animation: blink 1s infinite;
      }
      .pub-icon.inactive {
        background: var(--red-dim);
        border: 1px solid var(--red);
      }
      @keyframes blink {
        50% {
          opacity: 0.4;
        }
      }

      .badge {
        padding: 2px 8px;
        border-radius: 2px;
        font-size: 10px;
        font-weight: 700;
      }
      .badge.active {
        background: var(--green-dim);
        color: var(--green);
      }
      .badge.warning {
        background: var(--orange-dim);
        color: var(--orange);
      }
      .badge.inactive {
        background: var(--red-dim);
        color: var(--red);
      }

      .loading-row {
        color: var(--text-dim);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <div class="field">
          <label>App ID</label><input id="inp-appid" type="text" />
        </div>
        <div class="field">
          <label>Password</label><input id="inp-password" type="password" />
        </div>
        <button class="btn" onclick="connect()">CONNECT</button>
      </div>
    </div>

    <div id="dashboard">
      <div class="topbar">
        <div style="font-family: var(--font-mono); font-size: 12px">
          PHENIX <span style="color: var(--cyan)" id="disp-appid"></span>
        </div>
        <div
          style="
            display: flex;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 11px;
          "
        >
          <div>Total: <span id="stat-total">0</span></div>
          <button
            onclick="location.reload()"
            style="
              background: none;
              border: 1px solid var(--border);
              color: var(--text-dim);
              cursor: pointer;
            "
          >
            LOGOUT
          </button>
        </div>
      </div>

      <div class="toolbar">
        <input
          type="text"
          id="search-box"
          placeholder="Filter by name..."
          style="
            background: var(--bg3);
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px;
            width: 200px;
          "
          oninput="updateView()"
        />
        <label style="font-size: 11px; cursor: pointer"
          ><input type="checkbox" id="filter-active" onchange="updateView()" />
          SHOW ONLY ACTIVE</label
        >
        <div style="font-family: var(--font-mono); font-size: 11px">
          <button onclick="changePage(-1)">PREV</button>
          <span id="page-info">PAGE 1 / 1</span>
          <button onclick="changePage(1)">NEXT</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CHANNEL</th>
              <th style="text-align: center">PUBLISHERS</th>
              <th style="text-align: center">STATUS</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <script>
      const PROXY = "https://10.11.220.11/phenix-proxy";
      let appId,
        password,
        globalChannels = [],
        globalState = {},
        currentPage = 1,
        itemsPerPage = 15;

      function headers() {
        return { "X-App-Id": appId, "X-Password": password };
      }

      async function connect() {
        appId = document.getElementById("inp-appid").value;
        password = document.getElementById("inp-password").value;
        try {
          const res = await fetch(`${PROXY}/channels`, { headers: headers() });
          const data = await res.json();
          globalChannels = (
            Array.isArray(data) ? data : data.channels || []
          ).sort((a, b) =>
            a.name.localeCompare(b.name, undefined, { numeric: true })
          );

          document.getElementById("login-screen").style.display = "none";
          document.getElementById("dashboard").style.display = "flex";
          document.getElementById("stat-total").textContent =
            globalChannels.length;
          updateView();
        } catch (e) {
          alert("Check credentials");
        }
      }

      function updateView() {
        const search = document
          .getElementById("search-box")
          .value.toLowerCase();
        const activeOnly = document.getElementById("filter-active").checked;

        // Filtrar a lista completa
        let filtered = globalChannels.filter((ch) => {
          const matchesSearch = ch.name.toLowerCase().includes(search);
          if (!matchesSearch) return false;
          if (activeOnly) return globalState[ch.channelId] > 0;
          return true;
        });

        const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = filtered.slice(start, start + itemsPerPage);

        document.getElementById(
          "page-info"
        ).textContent = `PAGE ${currentPage} / ${totalPages}`;
        renderTable(pageItems);

        // Só carrega o status dos itens que estão NESTA página
        loadPageStatus(pageItems);
      }

      async function loadPageStatus(items) {
        await Promise.all(
          items.map(async (ch) => {
            try {
              const r = await fetch(
                `${PROXY}/publishers/count/${encodeURIComponent(ch.channelId)}`,
                { headers: headers() }
              );
              const txt = await r.text();
              globalState[ch.channelId] = parseInt(txt) || 0;
              updateRowUI(ch.channelId, globalState[ch.channelId]);
            } catch (e) {}
          })
        );
      }

      function renderTable(items) {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = items
          .map((ch) => {
            const status = globalState[ch.channelId];
            return `
      <tr id="row-${ch.channelId.replace(/[^a-z0-9]/gi, "")}">
        <td>${ch.name}</td>
        <td style="text-align:center" class="pub-cell">${
          status !== undefined ? getIcons(status) : "...ing"
        }</td>
        <td style="text-align:center" class="status-cell">${
          status !== undefined
            ? getBadge(status)
            : '<span class="loading-row">loading...</span>'
        }</td>
      </tr>`;
          })
          .join("");
      }

      function updateRowUI(id, count) {
        const safeId = id.replace(/[^a-z0-9]/gi, "");
        const row = document.getElementById(`row-${safeId}`);
        if (row) {
          row.querySelector(".pub-cell").innerHTML = getIcons(count);
          row.querySelector(".status-cell").innerHTML = getBadge(count);
        }
      }

      function getIcons(count) {
        if (count >= 2)
          return '<div class="pub-icon active"></div><div class="pub-icon active"></div>';
        if (count === 1)
          return '<div class="pub-icon warning"></div><div class="pub-icon inactive"></div>';
        return '<div class="pub-icon inactive"></div><div class="pub-icon inactive"></div>';
      }

      function getBadge(count) {
        if (count >= 2) return '<span class="badge active">HEALTHY</span>';
        if (count === 1) return '<span class="badge warning">NO BACKUP</span>';
        return '<span class="badge inactive">OFFLINE</span>';
      }

      function changePage(step) {
        currentPage = Math.max(1, currentPage + step);
        updateView();
      }
    </script>
  </body>
</html>
