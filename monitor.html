<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhenixRTS — Channel Health Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & base ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0e13;
    --bg2:       #111720;
    --bg3:       #1a2230;
    --border:    #1e2d40;
    --cyan:      #00d4ff;
    --cyan-dim:  #007a99;
    --green:     #00e676;
    --green-dim: #004d26;
    --red:       #ff3d5a;
    --red-dim:   #4d0012;
    --yellow:    #ffd740;
    --text:      #c8d8e8;
    --text-dim:  #506070;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Login screen ───────────────────────────────────────────── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #00d4ff12 0%, transparent 70%),
      var(--bg);
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 2.5rem 2rem;
    box-shadow: 0 0 60px #00d4ff08;
  }

  .login-logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .login-title {
    font-family: var(--font-mono);
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.25rem;
  }

  .login-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 2rem;
    font-family: var(--font-mono);
  }

  .field { margin-bottom: 1.2rem; }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 0.8rem;
    color: #fff;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--cyan-dim); }

  .field-row { display: flex; gap: 1rem; }
  .field-row .field { flex: 1; }

  #login-error {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 1rem;
    min-height: 1.2em;
  }

  .btn {
    width: 100%;
    background: var(--cyan);
    color: #000;
    border: none;
    border-radius: 3px;
    padding: 0.7rem 1rem;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Dashboard ──────────────────────────────────────────────── */
  #dashboard { display: none; flex-direction: column; height: 100vh; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 46px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .topbar-brand {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--cyan);
    text-transform: uppercase;
  }

  .topbar-version {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .stat-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .stat-pill span {
    color: var(--cyan);
    font-weight: 600;
  }

  #pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  #pulse.idle { background: var(--text-dim); box-shadow: none; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 3px;
    padding: 0.25rem 0.7rem;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-sm:hover { border-color: var(--red); color: var(--red); }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .statusbar-left {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .sb-item {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .sb-item span { font-weight: 600; }
  .sb-item .ok  { color: var(--green); }
  .sb-item .err { color: var(--red); }
  .sb-item .cnt { color: var(--cyan); }

  #next-refresh {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Table area */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--bg2);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 0.6rem 1.5rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
  }

  thead th.center { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--bg2); }

  tbody td {
    padding: 0.65rem 1.5rem;
    font-family: var(--font-mono);
    font-size: 13px;
    white-space: nowrap;
  }

  td.channel-name { color: var(--text); max-width: 340px; overflow: hidden; text-overflow: ellipsis; }
  td.publishers   { text-align: center; font-weight: 600; }
  td.status       { text-align: center; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.2rem 0.7rem;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .badge.active   { background: var(--green-dim); color: var(--green); }
  .badge.inactive { background: var(--red-dim);   color: var(--red);   }
  .badge.loading  { background: transparent;       color: var(--text-dim); }
  .badge.error    { background: var(--red-dim);    color: var(--red);   }

  .pub-active   { color: var(--green); }
  .pub-inactive { color: var(--red); }
  .pub-loading  { color: var(--text-dim); }

  /* Empty / loading state */
  .table-message {
    padding: 4rem;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Scrollbar */
  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Fade-in for new rows */
  @keyframes rowIn {
    from { opacity: 0; background: #00d4ff10; }
    to   { opacity: 1; background: transparent; }
  }
  .row-new { animation: rowIn 0.6s ease forwards; }
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">PhenixRTS</div>
    <div class="login-title">Channel Monitor</div>
    <div class="login-sub">v1.5.0 — connect to start monitoring</div>

    <div class="field-row">
      <div class="field">
        <label>App ID</label>
        <input id="inp-appid" type="text" placeholder="your-app-id" autocomplete="off" />
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="inp-password" type="password" placeholder="••••••••" />
    </div>
    <div class="field">
      <label>Refresh interval (seconds)</label>
      <input id="inp-interval" type="number" value="5" min="2" max="60" />
    </div>

    <div id="login-error"></div>
    <button class="btn" id="btn-connect" onclick="connect()">Connect</button>
  </div>
</div>

<!-- ── DASHBOARD ──────────────────────────────────────────────────── -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">PhenixRTS — Channel Health Monitor</div>
      <div class="topbar-version">v1.5.0</div>
    </div>
    <div class="topbar-right">
      <div class="stat-pill">Channels: <span id="stat-total">—</span></div>
      <div class="stat-pill">Active: <span id="stat-active" style="color:var(--green)">—</span></div>
      <div class="stat-pill">Offline: <span id="stat-offline" style="color:var(--red)">—</span></div>
      <div id="pulse" class="idle"></div>
      <button class="btn-sm" onclick="disconnect()">Disconnect</button>
    </div>
  </div>

  <div class="statusbar">
    <div class="statusbar-left">
      <div class="sb-item">Last update: <span id="last-update" class="cnt">—</span></div>
      <div class="sb-item">App ID: <span id="sb-appid" class="cnt">—</span></div>
    </div>
    <div id="next-refresh">Next refresh in —s</div>
  </div>

  <div class="table-wrap">
    <table id="channel-table">
      <thead>
        <tr>
          <th>Channel</th>
          <th class="center">Publishers</th>
          <th class="center">Status</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="3" class="table-message">Connecting...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const PROXY = 'http://10.11.220.11/phenix-proxy';

let appId       = '';
let password    = '';
let interval    = 5;
let timer       = null;
let countdown   = null;
let prevState   = {};   // channelId -> publishers count (or 'ERR')
let knownIds    = new Set();
let secondsLeft = 0;

// ── Auth helpers ─────────────────────────────────────────────────────
function headers() {
  return { 'X-App-Id': appId, 'X-Password': password };
}

// ── Connect ──────────────────────────────────────────────────────────
async function connect() {
  appId    = document.getElementById('inp-appid').value.trim();
  password = document.getElementById('inp-password').value;
  interval = parseInt(document.getElementById('inp-interval').value) || 5;

  if (!appId || !password) {
    setError('App ID and Password are required.');
    return;
  }

  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  setError('');

  try {
    const res = await fetch(`${PROXY}/channels`, { headers: headers() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.status || 'Unknown error');
  } catch (e) {
    setError(`Connection failed: ${e.message}`);
    btn.disabled = false;
    btn.textContent = 'Connect';
    return;
  }

  // Switch to dashboard
  document.getElementById('login-screen').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'flex';
  document.getElementById('sb-appid').textContent = appId;

  startMonitor();
}

function disconnect() {
  clearInterval(timer);
  clearInterval(countdown);
  prevState  = {};
  knownIds   = new Set();

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';

  const btn = document.getElementById('btn-connect');
  btn.disabled = false;
  btn.textContent = 'Connect';
}

function setError(msg) {
  document.getElementById('login-error').textContent = msg;
}

// ── Monitor loop ─────────────────────────────────────────────────────
function startMonitor() {
  fetchAndRender();
  timer = setInterval(fetchAndRender, interval * 1000);

  // Countdown ticker
  secondsLeft = interval;
  countdown = setInterval(() => {
    secondsLeft = Math.max(0, secondsLeft - 1);
    document.getElementById('next-refresh').textContent =
      `Next refresh in ${secondsLeft}s`;
  }, 1000);
}

async function fetchAndRender() {
  setPulse(true);
  secondsLeft = interval;

  // 1. Reload channel list
  let channels = [];
  try {
    const res  = await fetch(`${PROXY}/channels`, { headers: headers() });
    const data = await res.json();
    channels   = (data.channels || []).sort((a, b) =>
      (a.name || '').localeCompare(b.name || ''));
  } catch (e) {
    setPulse(false);
    return;
  }

  // 2. Fetch publisher counts in parallel
  const counts = await Promise.all(
    channels.map(async ch => {
      try {
        const res = await fetch(
          `${PROXY}/publishers/count/${encodeURIComponent(ch.channelId)}`,
          { headers: headers() }
        );
        if (res.status === 412) return { id: ch.channelId, count: 0 };
        if (!res.ok)            return { id: ch.channelId, count: 'ERR' };
        const txt = await res.text();
        return { id: ch.channelId, count: parseInt(txt.trim()) || 0 };
      } catch {
        return { id: ch.channelId, count: 'ERR' };
      }
    })
  );

  // 3. Build new state map
  const newState = {};
  counts.forEach(c => { newState[c.id] = c.count; });

  // 4. Check if anything changed
  const newIds   = new Set(channels.map(c => c.channelId));
  const idsMatch = setsEqual(newIds, knownIds);
  const changed  = !idsMatch || hasStateChanged(newState);

  if (changed) {
    renderTable(channels, newState, knownIds);
    prevState = { ...newState };
    knownIds  = newIds;
    updateStats(channels, newState);
  }

  document.getElementById('last-update').textContent = timestamp();
  setPulse(false);
}

// ── Render ───────────────────────────────────────────────────────────
function renderTable(channels, state, oldIds) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  if (!channels.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="table-message">No channels found.</td></tr>';
    return;
  }

  channels.forEach(ch => {
    const count  = state[ch.channelId];
    const isNew  = !oldIds.has(ch.channelId);
    const isErr  = count === 'ERR';
    const active = !isErr && count > 0;

    const tr = document.createElement('tr');
    if (isNew) tr.classList.add('row-new');

    const pubClass = isErr ? 'pub-loading' : (active ? 'pub-active' : 'pub-inactive');
    const pubText  = isErr ? '—' : count;

    let badgeHtml;
    if (isErr) {
      badgeHtml = `<span class="badge error">⚠ Error</span>`;
    } else if (active) {
      badgeHtml = `<span class="badge active">✓ Source Active</span>`;
    } else {
      badgeHtml = `<span class="badge inactive">✗ No Source</span>`;
    }

    tr.innerHTML = `
      <td class="channel-name" title="${esc(ch.channelId)}">${esc(ch.name || 'No name')}</td>
      <td class="publishers ${pubClass}">${pubText}</td>
      <td class="status">${badgeHtml}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateStats(channels, state) {
  const total   = channels.length;
  const active  = channels.filter(c => state[c.channelId] > 0).length;
  const offline = channels.filter(c => state[c.channelId] === 0).length;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-offline').textContent = offline;
}

// ── Helpers ──────────────────────────────────────────────────────────
function hasStateChanged(newState) {
  const prevKeys = Object.keys(prevState);
  const newKeys  = Object.keys(newState);
  if (prevKeys.length !== newKeys.length) return true;
  return newKeys.some(k => prevState[k] !== newState[k]);
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const v of a) if (!b.has(v)) return false;
  return true;
}

function setPulse(active) {
  document.getElementById('pulse').classList.toggle('idle', !active);
}

function timestamp() {
  return new Date().toLocaleTimeString('en-GB', { hour12: false });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Allow Enter key on login form
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    connect();
  }
});
</script>
</body>
</html>
