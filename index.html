<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --card:     #161621;
      --border:   #2a2a3a;
      --accent:   #00ffc8;
      --accent2:  #7b5ea7;
      --text:     #e8e8f0;
      --muted:    #6a6a8a;
      --danger:   #ff4e6a;
      --mono:     'Space Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    /* ── LAYOUT ── */
    #app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100vh;
    }

    /* ── TOPBAR ── */
    #topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    #topbar .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      flex-shrink: 0;
      animation: pulse-hex 3s ease-in-out infinite;
    }

    @keyframes pulse-hex {
      0%, 100% { filter: drop-shadow(0 0 4px var(--accent)); }
      50%       { filter: drop-shadow(0 0 12px var(--accent)); }
    }

    #topbar h1 {
      font-family: var(--display);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    #topbar h1 span { color: var(--accent); }

    #topbar .version {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: auto;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #search {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 8px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    .tools-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
    }
    .tools-list::-webkit-scrollbar { width: 4px; }
    .tools-list::-webkit-scrollbar-track { background: transparent; }
    .tools-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── CATEGORY ── */
    .category-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 10px 6px;
    }

    /* ── TOOL ITEM ── */
    .tool-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      margin-bottom: 2px;
      position: relative;
    }

    .tool-item:hover {
      background: var(--card);
      border-color: var(--border);
      transform: translateX(3px);
    }

    .tool-item.active {
      background: rgba(0, 255, 200, 0.07);
      border-color: rgba(0, 255, 200, 0.3);
    }

    .tool-item.active .tool-icon { color: var(--accent); }
    .tool-item.active .tool-name { color: var(--accent); }

    .tool-icon {
      font-size: 1.1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.15s;
    }

    .tool-info { flex: 1; min-width: 0; }

    .tool-name {
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }

    .tool-desc {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .tool-badge {
      font-family: var(--mono);
      font-size: 0.5rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(123,94,167,0.2);
      color: #b89cd4;
      border: 1px solid rgba(123,94,167,0.3);
      flex-shrink: 0;
    }

    /* ── OPEN BUTTON ── */
    .tool-open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .tool-item:hover .tool-open-btn { opacity: 1; }
    .tool-open-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ── SIDEBAR FOOTER ── */
    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-tool-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--display);
      font-size: 0.72rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .add-tool-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,255,200,0.04);
    }

    /* ── MAIN CONTENT ── */
    #content {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TAB BAR ── */
    #tab-bar {
      display: flex;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 2px;
      min-height: 42px;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
    }
    #tab-bar::-webkit-scrollbar { height: 2px; }
    #tab-bar::-webkit-scrollbar-track { background: transparent; }
    #tab-bar::-webkit-scrollbar-thumb { background: var(--border); }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 12px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      transition: background 0.15s, color 0.15s;
      position: relative;
      top: 1px;
      flex-shrink: 0;
    }

    .tab:hover { background: var(--card); color: var(--text); }

    .tab.active {
      background: var(--bg);
      color: var(--accent);
      border-color: var(--border);
      border-bottom-color: var(--bg);
    }

    .tab .tab-icon { font-size: 0.8rem; }

    .tab .tab-close {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      font-size: 0.65rem;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .tab .tab-close:hover { background: rgba(255,78,106,0.2); color: var(--danger); }

    /* ── IFRAME AREA ── */
    #frames {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .frame-wrapper {
      position: absolute;
      inset: 0;
      display: none;
    }
    .frame-wrapper.active { display: block; }

    .frame-wrapper iframe {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    /* ── WELCOME SCREEN ── */
    #welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
    }

    .welcome-glyph {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: rotate-hex 8s linear infinite;
      filter: drop-shadow(0 0 20px rgba(0,255,200,0.3));
    }
    @keyframes rotate-hex {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .welcome-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-sub {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
    }

    .welcome-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .welcome-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      text-align: center;
      min-width: 140px;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
    }
    .welcome-card:hover {
      border-color: var(--accent);
      background: rgba(0,255,200,0.05);
      transform: translateY(-3px);
    }
    .welcome-card .wc-icon { font-size: 1.6rem; margin-bottom: 8px; }
    .welcome-card .wc-name { font-size: 0.78rem; font-weight: 600; }
    .welcome-card .wc-desc { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); margin-top: 3px; }

    /* ── LOADING SPINNER ── */
    .frame-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 5;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS BAR ── */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 22px;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      z-index: 100;
    }
    #statusbar span {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--bg);
      font-weight: 700;
    }
    #statusbar .sep { opacity: 0.4; }

    /* Make room for statusbar */
    #app { padding-bottom: 22px; }

    /* ── MODAL (Add Tool) ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 420px;
      max-width: 90vw;
      animation: modal-in 0.2s ease;
    }
    @keyframes modal-in {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #modal h2 {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    #modal p {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 9px 12px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--card); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    /* ── TOOLTIP ── */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%);
      background: #1e1e2e;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
    }
    [data-tip]:hover::after { opacity: 1; }
  </style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="logo-mark"></div>
    <h1>Tool<span>Hub</span></h1>
    <span class="version">v1.0</span>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Search Tools</div>
      <input id="search" type="text" placeholder="Filter tools…" autocomplete="off" />
    </div>

    <div class="tools-list" id="tools-list">
      <!-- Populated by JS -->
    </div>

    <div class="sidebar-footer">
      <button class="add-tool-btn" id="btn-add-tool">
        <span>＋</span> Add Tool
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="content">
    <!-- TAB BAR -->
    <div id="tab-bar">
      <!-- Tabs injected here -->
    </div>

    <!-- FRAMES -->
    <div id="frames">
      <!-- Welcome -->
      <div id="welcome">
        <div class="welcome-glyph"></div>
        <h2 class="welcome-title">Select a Tool</h2>
        <p class="welcome-sub">
          Pick a tool from the sidebar to open it here, or click the cards below for quick access.
        </p>
        <div class="welcome-cards" id="welcome-cards">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span>● TOOL HUB</span>
  <span class="sep">|</span>
  <span id="status-msg">Ready</span>
  <span class="sep">|</span>
  <span id="status-count">0 tools loaded</span>
</div>

<!-- ADD TOOL MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add New Tool</h2>
    <p>Register a local HTML file as a tool in the hub. File must be in the same directory as index.html.</p>
    <div class="field">
      <label>Tool Name</label>
      <input id="new-name" type="text" placeholder="e.g. My Awesome Tool" />
    </div>
    <div class="field">
      <label>HTML Filename</label>
      <input id="new-file" type="text" placeholder="e.g. my-tool.html" />
    </div>
    <div class="field">
      <label>Short Description</label>
      <input id="new-desc" type="text" placeholder="e.g. Does something useful" />
    </div>
    <div class="field">
      <label>Category</label>
      <select id="new-cat">
        <option value="Streaming">Streaming</option>
        <option value="Utilities">Utilities</option>
        <option value="Media">Media</option>
        <option value="Network">Network</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Icon (emoji)</label>
      <input id="new-icon" type="text" placeholder="e.g. 🔧" maxlength="2" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-modal-save">Add Tool</button>
    </div>
  </div>
</div>

<script>
$(function () {

  /* ===================================================
     TOOL REGISTRY — edit this array to add/remove tools
     =================================================== */
  const DEFAULT_TOOLS = [
    {
      id:       'srt-uri-builder',
      name:     'SRT URI Builder',
      file:     'SRT-URI-Builder.html',
      desc:     'Build & encode SRT stream URLs',
      category: 'Streaming',
      icon:     '🔗',
      badge:    'SRT'
    },
    {
      id:       'rts-test-player',
      name:     'RTS Test Player',
      file:     'RTS-Test-Player.html',
      desc:     'Test & monitor RTS streams live',
      category: 'Streaming',
      icon:     '📺',
      badge:    'RTS'
    }
  ];

  /* ===================================================
     STATE
     =================================================== */
  let tools     = loadTools();
  let tabs      = [];      // { id, toolId }
  let activeTab = null;

  /* ===================================================
     PERSISTENCE
     =================================================== */
  function loadTools () {
    try {
      const saved = localStorage.getItem('toolhub_tools');
      if (saved) {
        const parsed = JSON.parse(saved);
        // Merge defaults if not already present
        const ids = parsed.map(t => t.id);
        DEFAULT_TOOLS.forEach(d => { if (!ids.includes(d.id)) parsed.unshift(d); });
        return parsed;
      }
    } catch (e) {}
    return [...DEFAULT_TOOLS];
  }

  function saveTools () {
    localStorage.setItem('toolhub_tools', JSON.stringify(tools));
  }

  /* ===================================================
     RENDER SIDEBAR
     =================================================== */
  function renderSidebar (filter = '') {
    const $list = $('#tools-list').empty();
    const q     = filter.trim().toLowerCase();

    const categories = [...new Set(tools.map(t => t.category))];

    categories.forEach(cat => {
      const catTools = tools.filter(t =>
        t.category === cat &&
        (!q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q))
      );
      if (!catTools.length) return;

      $list.append(`<div class="category-label">${cat}</div>`);

      catTools.forEach(tool => {
        const isActive = tabs.find(tb => tb.toolId === tool.id && tb.id === activeTab);
        const $item = $(`
          <div class="tool-item ${isActive ? 'active' : ''}" data-tool-id="${tool.id}">
            <span class="tool-icon">${tool.icon}</span>
            <div class="tool-info">
              <div class="tool-name">${tool.name}</div>
              <div class="tool-desc">${tool.desc}</div>
            </div>
            ${tool.badge ? `<span class="tool-badge">${tool.badge}</span>` : ''}
            <div class="tool-open-btn" data-tip="Open in new tab" data-tool-id="${tool.id}">⬡</div>
          </div>
        `);
        $list.append($item);
      });
    });

    if (!$list.children().length) {
      $list.append(`<div style="text-align:center;padding:30px;font-family:var(--mono);font-size:0.65rem;color:var(--muted)">No tools found</div>`);
    }

    $('#status-count').text(`${tools.length} tool${tools.length !== 1 ? 's' : ''} loaded`);
  }

  /* ===================================================
     RENDER WELCOME CARDS
     =================================================== */
  function renderWelcomeCards () {
    const $wc = $('#welcome-cards').empty();
    tools.forEach(tool => {
      $wc.append(`
        <div class="welcome-card" data-tool-id="${tool.id}">
          <div class="wc-icon">${tool.icon}</div>
          <div class="wc-name">${tool.name}</div>
          <div class="wc-desc">${tool.desc}</div>
        </div>
      `);
    });
  }

  /* ===================================================
     TABS
     =================================================== */
  function openTab (toolId) {
    const tool = tools.find(t => t.id === toolId);
    if (!tool) return;

    // Check if tab already exists
    const existing = tabs.find(tb => tb.toolId === toolId);
    if (existing) {
      activateTab(existing.id);
      return;
    }

    const tabId  = 'tab-' + Date.now();
    tabs.push({ id: tabId, toolId });

    // Create tab button
    const $tab = $(`
      <div class="tab" data-tab-id="${tabId}">
        <span class="tab-icon">${tool.icon}</span>
        <span class="tab-name">${tool.name}</span>
        <span class="tab-close" data-tab-id="${tabId}">✕</span>
      </div>
    `);
    $('#tab-bar').append($tab);

    // Create frame
    const $frame = $(`
      <div class="frame-wrapper" id="${tabId}">
        <div class="frame-loading"><div class="spinner"></div></div>
        <iframe src="${tool.file}" title="${tool.name}"></iframe>
      </div>
    `);
    $frame.find('iframe').on('load', function () {
      $frame.find('.frame-loading').fadeOut(200);
    });
    $('#frames').append($frame);

    activateTab(tabId);
    setStatus(`Opened: ${tool.name}`);
  }

  function activateTab (tabId) {
    activeTab = tabId;

    // Update tab buttons
    $('.tab').removeClass('active');
    $(`.tab[data-tab-id="${tabId}"]`).addClass('active');

    // Update frames
    $('.frame-wrapper').removeClass('active');
    $(`#${tabId}`).addClass('active');

    // Hide / show welcome
    if (tabs.length > 0) {
      $('#welcome').addClass('hidden');
    }

    renderSidebar($('#search').val());

    // Scroll tab into view
    const $t = $(`.tab[data-tab-id="${tabId}"]`);
    if ($t.length) {
      $t[0].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    }
  }

  function closeTab (tabId) {
    const idx   = tabs.findIndex(tb => tb.id === tabId);
    if (idx === -1) return;

    tabs.splice(idx, 1);
    $(`.tab[data-tab-id="${tabId}"]`).remove();
    $(`#${tabId}`).remove();

    if (tabs.length === 0) {
      activeTab = null;
      $('#welcome').removeClass('hidden');
      renderSidebar($('#search').val());
      setStatus('Ready');
    } else {
      const newIdx = Math.min(idx, tabs.length - 1);
      activateTab(tabs[newIdx].id);
    }
  }

  /* ===================================================
     STATUS BAR
     =================================================== */
  function setStatus (msg) {
    $('#status-msg').text(msg);
  }

  /* ===================================================
     ADD TOOL MODAL
     =================================================== */
  function openModal () {
    $('#new-name, #new-file, #new-desc, #new-icon').val('');
    $('#new-cat').val('Other');
    $('#new-icon').val('🔧');
    $('#modal-overlay').addClass('show');
  }

  function closeModal () {
    $('#modal-overlay').removeClass('show');
  }

  function saveTool () {
    const name = $('#new-name').val().trim();
    const file = $('#new-file').val().trim();
    const desc = $('#new-desc').val().trim();
    const cat  = $('#new-cat').val();
    const icon = $('#new-icon').val().trim() || '🔧';

    if (!name || !file) {
      $('#new-name').css('border-color', !name ? 'var(--danger)' : '');
      $('#new-file').css('border-color', !file ? 'var(--danger)' : '');
      return;
    }

    const id = file.replace(/\.html$/i, '').toLowerCase().replace(/\s+/g, '-');

    if (tools.find(t => t.id === id)) {
      alert('A tool with this file already exists.');
      return;
    }

    const tool = { id, name, file, desc: desc || 'No description', category: cat, icon, badge: '' };
    tools.push(tool);
    saveTools();
    renderSidebar($('#search').val());
    renderWelcomeCards();
    closeModal();
    setStatus(`Added: ${name}`);
  }

  /* ===================================================
     EVENTS
     =================================================== */

  // Open tool from sidebar (click anywhere on item)
  $(document).on('click', '.tool-item', function (e) {
    if ($(e.target).hasClass('tool-open-btn') || $(e.target).closest('.tool-open-btn').length) return;
    openTab($(this).data('toolId'));
  });

  // Open tool in browser tab (open-btn)
  $(document).on('click', '.tool-open-btn', function (e) {
    e.stopPropagation();
    const toolId = $(this).data('toolId');
    const tool   = tools.find(t => t.id === toolId);
    if (tool) window.open(tool.file, '_blank');
  });

  // Click tab to activate
  $(document).on('click', '.tab', function (e) {
    if ($(e.target).hasClass('tab-close') || $(e.target).closest('.tab-close').length) return;
    activateTab($(this).data('tabId'));
  });

  // Close tab
  $(document).on('click', '.tab-close', function (e) {
    e.stopPropagation();
    closeTab($(this).data('tabId'));
  });

  // Welcome cards
  $(document).on('click', '.welcome-card', function () {
    openTab($(this).data('toolId'));
  });

  // Search
  $('#search').on('input', function () {
    renderSidebar($(this).val());
  });

  // Add tool modal
  $('#btn-add-tool').on('click', openModal);
  $('#btn-modal-cancel').on('click', closeModal);
  $('#btn-modal-save').on('click', saveTool);
  $('#modal-overlay').on('click', function (e) {
    if ($(e.target).is('#modal-overlay')) closeModal();
  });

  // Clear error highlight
  $('#new-name, #new-file').on('input', function () {
    $(this).css('border-color', '');
  });

  // Keyboard: Ctrl+W to close active tab, Escape to close modal
  $(document).on('keydown', function (e) {
    if (e.key === 'Escape')              closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'w' && activeTab) {
      e.preventDefault();
      closeTab(activeTab);
    }
  });

  /* ===================================================
     INIT
     =================================================== */
  renderSidebar();
  renderWelcomeCards();
  setStatus('Ready');

});
</script>
</body>
</html>
